<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiche</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <style>
        body {
            background:#0f172a;
            color:white;
            font-family:Arial;
            margin:0;
            padding:10px 10px 80px 10px;
        }

        .card {
            background:#1e293b;
            padding:16px;
            border-radius:14px;
            margin-bottom:16px;
        }

        .title {
            font-size:16px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .mini-kpi {
            font-size:13px;
            margin-top:6px;
            display:flex;
            justify-content:space-between;
        }

        canvas {
            max-height:200px;
        }

        .navbar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 420px;
            background: #020617;
            border-radius: 22px;
            display: flex;
            justify-content: space-between;
            padding: 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 9999;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            padding: 6px 4px;
            border-radius: 14px;
            transition: 0.2s;
        }

        .nav-item i {
            width: 26px;
            height: 26px;
            stroke-width: 2.2;
        }

        .nav-item span {
            font-size: 10px;
            margin-top: 3px;
        }

        .nav-item.active {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

    </style>
</head>

<body>

<h2 style="text-align:center;">📊 Statistiche</h2>

<div id="stats"></div>

<script>

    function generaColori(n){
        let c=[];
        for(let i=0;i<n;i++){
            let h=Math.floor((i*360)/n);
            c.push(`hsl(${h},70%,55%)`);
        }
        return c;
    }

    function carica(){

        fetch('/ordini/storico')
            .then(r=>r.json())
            .then(data=>{

                let macchine={};
                let clientiPerMacchina={};

// COSTRUZIONE DATI
                data.forEach(o=>{
                    let nome=o.macchina.nome;
                    let cliente=(o.cliente || "N/D").toUpperCase().trim();

                    if(!macchine[nome]){
                        macchine[nome]={pezzi:0,ordini:0};
                    }

                    macchine[nome].pezzi += o.pezziProdotti||0;
                    macchine[nome].ordini++;

                    if(!clientiPerMacchina[nome]){
                        clientiPerMacchina[nome]={};
                    }

                    if(!clientiPerMacchina[nome][cliente]){
                        clientiPerMacchina[nome][cliente]=0;
                    }

                    clientiPerMacchina[nome][cliente]+=o.pezziProdotti||0;
                });

// 🔥 ARRAY ORDINATO UNICO
                let macchineOrdinate = Object.entries(macchine)
                    .sort((a,b)=>["T1","T2","T3"].indexOf(a[0]) - ["T1","T2","T3"].indexOf(b[0]));

// HTML
                let html="";

                macchineOrdinate.forEach(([nome,m],i)=>{

                    html+=`
<div class="card">
<div class="title">${nome}</div>

<canvas id="pie${i}"></canvas>

<div class="mini-kpi">
<span>📦 ${m.pezzi}</span>
<span>⚙️ ${m.ordini}</span>
</div>
</div>`;
                });

                document.getElementById("stats").innerHTML=html;

// GRAFICI (STESSO ARRAY!)
                macchineOrdinate.forEach(([nome,m],i)=>{

                    let clienti = clientiPerMacchina[nome] || {};

                    let entries = Object.entries(clienti).sort((a,b)=>b[1]-a[1]);

                    let top = entries.slice(0,4);
                    let altri = entries.slice(4).reduce((sum,e)=>sum+e[1],0);

                    let labels = top.map(e=>e[0]);
                    let values = top.map(e=>e[1]);

                    if(altri>0){
                        labels.push("ALTRI");
                        values.push(altri);
                    }

                    new Chart(document.getElementById(`pie${i}`),{
                        type:'pie',
                        data:{
                            labels:labels,
                            datasets:[{
                                data:values,
                                backgroundColor:generaColori(values.length)
                            }]
                        },
                        options:{
                            plugins:{
                                legend:{
                                    position:'bottom',
                                    labels:{
                                        color:'white',
                                        font:{size:11}
                                    }
                                },
                                datalabels:{
                                    color:'#fff',
                                    font:{weight:'bold',size:10},
                                    formatter:(value,ctx)=>{
                                        let total = ctx.dataset.data.reduce((a,b)=>a+b,0);
                                        let perc = value/total*100;
                                        return perc < 5 ? "" : perc.toFixed(1)+"%";
                                    }
                                }
                            }
                        },
                        plugins:[ChartDataLabels]
                    });

                });

            });
    }

    carica();

</script>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-item" onclick="location.href='/mobile.html'">
        <i data-lucide="bar-chart-3"></i>
        <span>Dashboard</span>
    </div>

    <div class="nav-item" onclick="location.href='/mobile-lista.html'">
        <i data-lucide="clipboard-list"></i>
        <span>Ordini</span>
    </div>

    <div class="nav-item active" onclick="location.href='/mobile-stats.html'">
        <i data-lucide="pie-chart"></i>
        <span>Stats</span>
    </div>

    <div class="nav-item" onclick="location.href='/mobile-sospesi.html'">
        <i data-lucide="pause-circle"></i>
        <span>Sospesi</span>
    </div>

    <div class="nav-item" onclick="location.href='/mobile-storico.html'">
        <i data-lucide="line-chart"></i>
        <span>Storico</span>
    </div>
</div>

</div>

</body>
</html>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>
