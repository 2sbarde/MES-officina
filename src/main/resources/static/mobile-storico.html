<!DOCTYPE html>
<html lang="it">
<head>
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Storico Produzione MES</title>

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      margin: 0;
      padding: 10px 10px 80px 10px;
    }

    .topbar {
      background: #020617;
      padding: 14px;
      text-align: center;
      font-weight: bold;
    }

    .kpi {
      display:flex;
      gap:10px;
      margin-bottom:10px;
    }

    .kpi-box {
      flex:1;
      background:#1e293b;
      padding:10px;
      border-radius:10px;
      text-align:center;
    }

    .card {
      background:#1e293b;
      padding:14px;
      border-radius:12px;
      margin:10px 0;
    }

    .badge {
      background:#020617;
      padding:4px 8px;
      border-radius:8px;
      font-size:12px;
      display:inline-flex;
      gap:6px;
      align-items:center;
    }

    .row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:6px;
    }

    .progress {
      height:10px;
      background:#334155;
      border-radius:6px;
      margin-top:6px;
    }

    .bar { height:100%; }

    .navbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 420px;
      background: #020617;
      border-radius: 22px;
      display: flex;
      justify-content: space-between;
      padding: 8px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #94a3b8;
      padding: 6px 4px;
    }

    .nav-item i {
      width: 26px;
      height: 26px;
    }

    .nav-item span {
      font-size: 10px;
    }

    .nav-item.active {
      color: #f59e0b;
    }
  </style>
</head>

<body>

<div class="topbar">📊 STORICO</div>

<div id="kpi" class="kpi"></div>
<div id="lista"></div>

<script>
  let dati = [];

  function carica(){
    fetch('/ordini/storico')
            .then(r=>r.json())
            .then(data=>{
              dati = data;
              calcolaKPI();
              render();
            });
  }

  function calcolaKPI(){
    let ordini = dati.length;
    let pezzi = 0;

    dati.forEach(o=>{
      pezzi += o.pezziProdotti || 0;
    });

    document.getElementById("kpi").innerHTML = `
    <div class="kpi-box">Ordini<br><b>${ordini}</b></div>
    <div class="kpi-box">Pezzi<br><b>${pezzi}</b></div>
  `;
  }

  function render(){
    let html = "";

    dati.forEach(o=>{

      let perc = o.quantita>0 ? Math.round((o.pezziProdotti/o.quantita)*100) : 0;

      let color = "#22c55e";
      if(perc<30) color="#ef4444";
      else if(perc<70) color="#f59e0b";

      html += `
<div class="card">

<!-- RIGA 1 -->
<div class="row">
  <div><b>${o.numeroCommessa || ""}</b></div>
  <div class="badge">🏭 ${o.macchina?.nome || "-"}</div>
</div>

<!-- RIGA 2 -->
<div style="font-size:15px; font-weight:700;">
  ${o.cliente || "-"}
</div>

<div style="font-size:13px; opacity:0.9;">
  ${o.codiceParticolare || "-"}
</div>

<!-- RIGA 3 -->
<div style="margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;">
  <div class="badge">📦 Qta ${o.quantita}</div>
  <div class="badge">⏱ Tc ${o.tempoCicloSec ?? "-"}</div>
  <div class="badge">🔩 ${o.materiale || "-"}</div>
  ${o.diametroBarra ? `<div class="badge">Ø ${o.diametroBarra}</div>` : ""}
</div>

<!-- FASI -->
${o.fasi ? `
<div style="margin-top:6px;">
  <div style="font-size:12px; color:#94a3b8;">Fasi:</div>
  <div style="font-size:13px; color:#93c5fd;">
    🔄 ${o.fasi.split(",").map(f => f.trim()).join(" → ")}
  </div>
</div>
` : ""}

<!-- DATE -->
<div style="margin-top:6px; font-size:13px;">
  📅 Chiuso: ${
              o.dataChiusura
                      ? new Date(o.dataChiusura).toLocaleDateString("it-IT")
                      : "-"
      }
</div>

<!-- PRODUZIONE -->
<div style="margin-top:6px;">
  ${o.pezziProdotti}/${o.quantita}
</div>

<div class="progress">
  <div class="bar" style="width:${perc}%; background:${color};"></div>
</div>

</div>
`;
    });

    document.getElementById("lista").innerHTML = html;
  }

  carica();
</script>

<div class="navbar">
  <div class="nav-item" onclick="location.href='/mobile.html'">
    <i data-lucide="bar-chart-3"></i>
    <span>Dashboard</span>
  </div>

  <div class="nav-item" onclick="location.href='/mobile-lista.html'">
    <i data-lucide="clipboard-list"></i>
    <span>Ordini</span>
  </div>

  <div class="nav-item" onclick="location.href='/mobile-ordini.html'">
    <i data-lucide="plus"></i>
    <span>Crea</span>
  </div>

  <div class="nav-item" onclick="location.href='/mobile-sospesi.html'">
    <i data-lucide="pause-circle"></i>
    <span>Sospesi</span>
  </div>

  <div class="nav-item active" onclick="location.href='/mobile-storico.html'">
    <i data-lucide="line-chart"></i>
    <span>Storico</span>
  </div>
</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
