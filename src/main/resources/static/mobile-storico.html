<!DOCTYPE html>
<html lang="it">
<head>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png?v=10">

  <link rel="icon" sizes="512x512" href="/icon-512.png?v=10">
  <link rel="shortcut icon" href="/icon-512.png?v=10">
  <meta charset="UTF-8">
  <title>Storico Produzione MES</title>

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px 10px 80px 10px;
      min-height: 100vh;
    }
    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    .topbar {
      background: #020617;
      padding: 14px;
      text-align: center;
      font-weight: bold;
    }

    .kpi {
      display:flex;
      gap:10px;
      margin-bottom:10px;
    }

    .kpi-box {
      flex:1;
      background:#1e293b;
      padding:10px;
      border-radius:10px;
      text-align:center;
    }

    .card {
      background:#1e293b;
      padding:14px;
      border-radius:12px;
      margin:10px 0;
    }

    .progress {
      height:10px;
      background:#334155;
      border-radius:6px;
      margin-top:6px;
    }

    .bar { height:100%; }

    .navbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 420px;
      background: #020617;
      border-radius: 22px;
      display: flex;
      justify-content: space-between;
      padding: 8px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 9999;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      padding: 6px 4px;
      border-radius: 14px;
      transition: 0.2s;
    }

    .nav-item i {
      width: 26px;
      height: 26px;
      stroke-width: 2.2;
    }

    .nav-item span {
      font-size: 10px;
      margin-top: 3px;
    }

    .nav-item.active {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }
  </style>
</head>

<body>

<div class="topbar">📊 STORICO</div>

<div id="kpi" class="kpi"></div>
<div id="lista"></div>

<script>
  const kpi = document.getElementById("kpi");
  const lista = document.getElementById("lista");

  let dati = [];

  function carica(){
    fetch('/ordini/storico')
            .then(r=>r.json())
            .then(data=>{
              dati = data;
              calcolaKPI();
              render();
            });
  }

  function calcolaKPI(){
    let ordini = dati.length;
    let pezzi = 0;

    dati.forEach(o=>{
      pezzi += o.pezziProdotti || 0;
    });

    kpi.innerHTML = `
<div class="kpi-box">Ordini<br><b>${ordini}</b></div>
<div class="kpi-box">Pezzi<br><b>${pezzi}</b></div>
`;
  }

  function render(){
    let html = "";

    dati.forEach(o=>{

      let perc = o.quantita>0 ? Math.round((o.pezziProdotti/o.quantita)*100) : 0;

      let color = "#22c55e";
      if(perc<30) color="#ef4444";
      else if(perc<70) color="#f59e0b";

      html += `
<div class="card">

<div style="display:flex; justify-content:space-between; align-items:center;">
    <div><b>${o.numeroCommessa}</b></div>
    <div style="font-size:12px; opacity:0.8;">
        🏭 ${o.macchina?.nome || "-"}
    </div>
</div>

<div>${o.cliente||""}</div>

<div style="margin-top:4px;">
    ${o.codiceParticolare||""}
</div>

<div style="margin-top:6px; font-size:13px; opacity:0.85;">
    📅 ${o.dataChiusura
              ? new Date(o.dataChiusura).toLocaleDateString("it-IT")
              : "-"}
</div>

<div style="margin-top:6px;">
    ${o.pezziProdotti}/${o.quantita}
</div>

<div class="progress">
    <div class="bar" style="width:${perc}%;background:${color};"></div>
</div>

</div>
`;
    });

    lista.innerHTML = html;
  }

  carica();
</script>

<div class="navbar">
  <div class="nav-item" onclick="location.href='/mobile.html'">
    <i data-lucide="bar-chart-3"></i>
    <span>Dashboard</span>
  </div>

  <div class="nav-item" onclick="location.href='/mobile-lista.html'">
    <i data-lucide="clipboard-list"></i>
    <span>Ordini</span>
  </div>

  <div class="nav-item" onclick="location.href='/mobile-ordini.html'">
    <i data-lucide="plus"></i>
    <span>Crea</span>
  </div>

  <div class="nav-item" onclick="location.href='/mobile-sospesi.html'">
    <i data-lucide="pause-circle"></i>
    <span>Sospesi</span>
  </div>

  <div class="nav-item active" onclick="location.href='/mobile-storico.html'">
    <i data-lucide="line-chart"></i>
    <span>Storico</span>
  </div>
</div>
<script>
  lucide.createIcons();
</script>
</body>
</html>
