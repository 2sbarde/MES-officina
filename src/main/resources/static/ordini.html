<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ordini</title>

    <style>
        /* RESPONSIVE */

        @media (max-width: 1200px) {
            .container-macchine {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .container-macchine {
                grid-template-columns: 1fr;
            }
        }
        body { background:#0f0f0f; color:white; font-family:Arial; margin:10px; }

        .form-row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
        .form-row input, .form-row select {
            flex:1; min-width:120px; padding:10px; border-radius:6px; border:none;
        }

        input, select {
            padding:4px;
            font-size:12px;
        }

        button {
            padding:4px;
            font-size:11px;
            border:none;
            color:white;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        .btn-setup { background:#f59e0b; }
        .btn-start { background:#16a34a; }
        .btn-del { background:#dc2626; }

        .ordine-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap:6px;
            padding:10px;
            font-size: clamp(10px, 1vw, 12px);

            margin-bottom:12px;              /* 🔥 spazio tra ordini */
            border-radius:8px;              /* 🔥 forma */
            background:#222;                /* 🔥 separazione visiva */
            box-shadow:0 2px 6px rgba(0,0,0,0.4);
        }
        .ordine-row input,
        .ordine-row select {
            width:100%;
        }

        .CREATO { background:#333; }
        .IN_SETUP { background:#f59e0b; }
        .IN_PRODUZIONE { background:#16a34a; }

        .ritardo { border-left:5px solid red; }
        .urgente { border-left:5px solid orange; }

        .container-macchine {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap:8px;
        }

        .colonna {
            background:#1a1a1a;
            padding:5px;
            border-radius:10px;
        }

        h2 {
            font-size:14px;
            margin:5px 0;
            text-align:center;
        }
        .tempo-input {
            width:55px !important;
            text-align:center;
            padding:3px;
            font-size:11px;
        }
        .macchina-select {
            width:70px !important;
            padding:3px;
            font-size:11px;
            text-align:center;
        }
        .topnav {
            position: sticky;
            top: 0;
            background: #020617;
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
            border-bottom: 1px solid #1e293b;
        }

        .topnav a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .topnav a:hover {
            background: #1e293b;
        }
        .ordine {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
        }

    </style>
</head>

<body>
<div class="topnav">
    <a href="/index.html">🏭 Dashboard</a>
    <a href="/ordini.html">📋 Ordini</a>
    <a href="/sospesi.html">⏸ Sospesi</a>
    <a href="/storico.html">📊 Storico</a>
</div>

<h1>📋 Ordini per macchina</h1>

<div class="form-row">
    <input id="commessa" placeholder="Commessa">
    <input id="codice" placeholder="Codice">
    <input id="cliente" placeholder="Cliente">
    <input id="materiale" placeholder="Materiale">
    <input id="diametro" placeholder="Ø">
    <input id="quantita" type="number" placeholder="Qta">
    <input id="tempo" type="number" placeholder="Tempo">
    <input id="lunghezza" placeholder="Lunghezza (mm)">

    <div id="risultatoBarre" style="
margin-top:5px;
font-size:12px;
color:#93c5fd;
"></div>
    <input id="scadenza" type="date">
    <select id="machineSelect"></select>
    <button onclick="crea()">CREA</button>
</div>

<hr>

<div id="lista"></div>

<script>

    function formatData(dataString){
        if(!dataString) return "";
        let d = new Date(dataString);
        let giorno = String(d.getDate()).padStart(2,'0');
        let mese = String(d.getMonth()+1).padStart(2,'0');
        let anno = d.getFullYear();
        return `${giorno}/${mese}/${anno}`;
    }

    function caricaMacchine(){
        fetch('/macchine')
            .then(r=>r.json())
            .then(data=>{
                machineSelect.innerHTML="";
                data.forEach(m=>{
                    machineSelect.innerHTML+=`<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    function crea(){
        let ordine={
            numeroCommessa:commessa.value,
            codiceParticolare:codice.value,
            cliente:cliente.value,
            materiale:materiale.value,
            diametroBarra:diametro.value,
            quantita:parseInt(quantita.value),
            tempoCicloSec:parseInt(tempo.value),
            dataScadenza:scadenza.value,
            macchina:{id:parseInt(machineSelect.value)}
        };

        fetch('/ordini',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(ordine)
        }).then(()=>carica());
    }

    function setup(id){
        fetch(`/ordini/${id}/setup`,{method:'POST'}).then(()=>carica());
    }

    function start(id){
        fetch(`/ordini/${id}/start`,{method:'POST'}).then(()=>carica());
    }

    function elimina(id){
        if(!confirm("Eliminare?"))return;
        fetch(`/ordini/${id}/elimina`,{method:'POST'}).then(()=>carica());
    }

    function carica(){
        fetch('/ordini')
            .then(r=>r.json())
            .then(data=>render(data));
    }

    function render(data){

        let gruppi={};

        data.filter(o=>o.stato!=="COMPLETATO").forEach(o=>{
            let nome=o.macchina?o.macchina.nome:"NON ASSEGNATO";
            if(!gruppi[nome]) gruppi[nome]=[];
            gruppi[nome].push(o);
        });

        let html = `<div class="container-macchine">`;

        let macchineOrdine = ["T1","T2","T3"];

        macchineOrdine.forEach(nomeMacchina => {

            html += `<div class="colonna"><h2>${nomeMacchina}</h2>`;

            let listaOrdini = gruppi[nomeMacchina] || [];

            listaOrdini
                .sort((a,b)=>{

                    // PRIORITÀ STATO
                    const priorita = {
                        "IN_PRODUZIONE": 1,
                        "IN_SETUP": 2,
                        "CREATO": 3
                    };

                    let pa = priorita[a.stato] || 99;
                    let pb = priorita[b.stato] || 99;

                    if(pa !== pb) return pa - pb;

                    // se stesso stato → ordina per scadenza
                    let da = a.dataScadenza ? new Date(a.dataScadenza) : new Date(9999999999999);
                    let db = b.dataScadenza ? new Date(b.dataScadenza) : new Date(9999999999999);

                    return da - db;
                })
                .forEach(o=>{

                    let classe=o.stato;

                    let scad="";
                    if(o.dataScadenza){
                        let diff=(new Date(o.dataScadenza)-new Date())/(1000*60*60*24);
                        if(diff<0) scad="ritardo";
                        else if(diff<2) scad="urgente";
                    }

                    html+=`
<div class="ordine-row ${classe} ${scad}">

<div><b>${o.numeroCommessa||""}</b></div>
<div>📦 ${o.quantita}</div>

<div>${o.cliente||""}</div>
<div>⚙️</div>

<div>
    ${o.codiceParticolare||""}

    <div style="
        margin-top:4px;
        display:flex;
        gap:6px;
        flex-wrap:wrap;
    ">
        <span style="
            background:#1e293b;
            padding:3px 6px;
            border-radius:5px;
            font-size:10px;
        ">
            🔩 ${o.materiale || "-"}
        </span>

        ${o.diametroBarra ? `
        <span style="
            background:#0f172a;
            border:1px solid #334155;
            padding:3px 6px;
            border-radius:5px;
            font-size:10px;
        ">
            Ø ${o.diametroBarra}
        </span>
        ` : ""}
    </div>
</div>
<div style="
    display:flex;
    align-items:center;
    gap:6px;
    background:#020617;
    padding:4px 6px;
    border-radius:6px;
    width:fit-content;
">
    <span style="font-size:12px;">⏱</span>
    <input class="tempo-input" type="number" value="${o.tempoCicloSec || 0}"
    onchange="aggiornaTempo(${o.id}, this.value)"
    style="background:transparent; border:none; color:white; width:50px;">
</div>

<div>📅 ${formatData(o.dataScadenza)}</div>
<div>
${o.stato==="CREATO" ? `
<select class="macchina-select" onchange="cambiaMacchina(${o.id}, this.value)">
<option value="1" ${o.macchina?.id==1?"selected":""}>T1</option>
<option value="2" ${o.macchina?.id==2?"selected":""}>T2</option>
<option value="3" ${o.macchina?.id==3?"selected":""}>T3</option>
</select>
` : ""}
</div>

<div>
${o.stato==="CREATO" ? `<button class="btn-setup" onclick="setup(${o.id})">SETUP</button>` : ""}
${o.stato==="IN_SETUP" ? `<button class="btn-start" onclick="start(${o.id})">START</button>` : ""}
<button class="btn-del" onclick="elimina(${o.id})">❌</button>
</div>

<div><b>${o.stato}</b></div>

</div>`;
                });

            html += `</div>`;
        });

        html += `</div>`;

        lista.innerHTML=html;
    }

    function aggiornaTempo(id, valore){
        if(valore === "" || valore == null) return;
        valore = parseInt(valore);
        if(isNaN(valore) || valore <= 0){
            alert("Valore non valido");
            return;
        }
        fetch(`/ordini/${id}/tempo?tempo=${valore}`, {method:'POST'});
    }

    function cambiaMacchina(id, macchinaId){
        fetch(`/ordini/${id}/macchina?macchinaId=${macchinaId}`, {method:'POST'})
            .then(()=>carica());
    }

    caricaMacchine();
    carica();
    function parseNumero(valore) {
        if (!valore) return NaN;
        valore = valore.replace(/\s/g, "").replace(",", ".");
        return parseFloat(valore);
    }

    function calcolaBarre() {

        let L = parseNumero(document.getElementById("lunghezza").value);
        let Q = parseInt(document.getElementById("quantita").value);
        let macchina = document.getElementById("machineSelect").value;

        // 👉 obbligo macchina selezionata
        if (!macchina) {
            risultatoBarre.innerHTML = "";
            return;
        }

        if (isNaN(L) || isNaN(Q) || Q <= 0) {
            risultatoBarre.innerHTML = "";
            return;
        }

        let barra = 3000;
        let extra = 3.5;

        // 👉 adattato al tuo select (id macchina numerico)
        let scarto = (macchina == 1) ? 300 : 150;

        let lunghezzaEff = L + extra;
        let utile = barra - scarto;

        let pezziBarra = Math.floor(utile / lunghezzaEff);

        if (pezziBarra <= 0) {
            risultatoBarre.innerHTML = "⚠️ troppo lungo";
            return;
        }

        let barre = Math.ceil(Q / pezziBarra);

        risultatoBarre.innerHTML =
            `Barre: <b>${barre}</b> (${pezziBarra}/barra)`;
    }
    document.getElementById("lunghezza").addEventListener("input", calcolaBarre);
    document.getElementById("quantita").addEventListener("input", calcolaBarre);
    document.getElementById("machineSelect").addEventListener("change", calcolaBarre);
</script>

</body>
</html>
