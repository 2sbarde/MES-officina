<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordini</title>

    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-grid input,
        .form-grid select,
        .form-grid button {
            padding: 10px;
        }
        body { background:#111; color:white; font-family:Arial; }

        input, select {
            padding:8px;
            margin:5px;
        }

        button {
            padding:8px;
            margin:5px;
        }

        .ordine {
            border:1px solid #444;
            padding:10px;
            margin:10px;
            border-radius:8px;
        }
    </style>
</head>

<body>

<h1>📋 Ordini</h1>
<a href="/" style="color:lightblue;">⬅ Torna alla Dashboard</a>

<div class="form-grid">

    <input id="commessa" placeholder="Commessa">
    <input id="codice" placeholder="Codice">
    <input id="cliente" placeholder="Cliente">

    <input id="materiale" placeholder="Materiale">
    <input id="diametro" placeholder="Diametro">

    <input id="quantita" type="number" placeholder="Quantità">
    <input id="tempo" type="number" placeholder="Tempo ciclo">

    <select id="machineSelect"></select>

    <button onclick="crea()">CREA</button>

</div>

<hr>

<div id="lista"></div>

<script>

    let machines = [];

    function caricaMacchine() {
        fetch('/machines')
            .then(r => r.json())
            .then(data => {
                machines = data;

                let select = document.getElementById("machineSelect");
                select.innerHTML = "";

                data.forEach(m => {
                    select.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    function crea() {

        let machineId = document.getElementById("machineSelect").value;

        let ordine = {
            numeroCommessa: document.getElementById("commessa").value,
            codiceParticolare: document.getElementById("codice").value,
            cliente: document.getElementById("cliente").value,

            materiale: document.getElementById("materiale").value,
            diametroBarra: document.getElementById("diametro").value,

            quantita: parseInt(document.getElementById("quantita").value),
            tempoCicloSec: parseInt(document.getElementById("tempo").value),

            macchina: { id: parseInt(machineId) }
        };

        fetch('/ordini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ordine)
        })
            .then(r => {
                if (!r.ok) throw new Error("Errore creazione ordine");
                return r.json();
            })
            .then(() => carica())
            .catch(err => alert(err));
    }

    function carica() {
        fetch('/ordini')
            .then(r => r.json())
            .then(data => {

                lista.innerHTML = "";

                data.forEach(o => {
                    lista.innerHTML += `
                <div class="ordine">
                    <b>${o.numeroCommessa}</b><br>
                    Cliente: ${o.cliente || "-"}<br>
                    Materiale: ${o.materiale || "-"}<br>
                    Diametro: ${o.diametroBarra || "-"}<br>
                    Macchina: ${o.macchina ? o.macchina.nome : "-"}<br>
                    Stato: ${o.stato}<br><br>

                    <button onclick="elimina(${o.id})">❌ Elimina</button>
                </div>
                `;
                });

            });
    }
    function elimina(id) {

        if (!confirm("Sei sicuro di eliminare l'ordine?")) return;

        fetch(`/ordini/${id}/elimina`, {
            method: 'POST'
        }).then(() => carica());
    }

    caricaMacchine();
    carica();

</script>

</body>
</html>
