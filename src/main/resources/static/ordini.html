<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Inserimento Ordini</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        input, select { margin:5px; padding:5px; }

        button { padding:8px; margin:10px; }

        .nav { margin-bottom:20px; }
    </style>
</head>

<body>

<div class="nav">
    <a href="/" style="color:white;">🏭 Dashboard</a>
</div>

<h1>📋 Inserimento Ordini</h1>

<input id="commessa" placeholder="Numero commessa"><br>
<input id="codice" placeholder="Codice particolare"><br>
<input id="quantita" type="number" placeholder="Quantità"><br>
<input id="tempo" type="number" placeholder="Tempo ciclo (sec)"><br>

<select id="macchina">
    <option value="T1">T1</option>
    <option value="T2">T2</option>
    <option value="T3">T3</option>
</select>

<br>

<button onclick="crea()">CREA ORDINE</button>

<script>

    function crea() {

        let macchinaNome = document.getElementById("macchina").value;

        fetch('/ordini', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                numeroCommessa: document.getElementById("commessa").value,
                codiceParticolare: document.getElementById("codice").value,
                quantita: parseInt(document.getElementById("quantita").value),
                tempoCicloSec: parseInt(document.getElementById("tempo").value),

                // 🔥 FIX IMPORTANTE
                macchina: {
                    nome: macchinaNome
                }
            })
        })
            .then(r => {
                if (!r.ok) throw new Error("Errore creazione ordine");
                return r.json();
            })
            .then(() => {
                alert("Ordine creato!");
                location.reload();
            })
            .catch(e => {
                alert("Errore!");
                console.error(e);
            });
    }

</script>

</body>
</html>
