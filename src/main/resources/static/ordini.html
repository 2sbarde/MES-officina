<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordini</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        input, select {
            padding:8px;
            margin:5px;
        }

        button {
            padding:8px;
            margin:5px;
        }

        .ordine {
            border:1px solid #444;
            padding:10px;
            margin:10px;
            border-radius:8px;
        }
    </style>
</head>

<body>

<h1>📋 Ordini</h1>

<div>
    <input id="commessa" placeholder="Commessa">
    <input id="codice" placeholder="Codice">
    <input id="cliente" placeholder="Cliente">
    <input id="quantita" type="number" placeholder="Quantità">
    <input id="tempo" type="number" placeholder="Tempo ciclo (sec)">

    <!-- 🔥 SELECT MACHINE -->
    <select id="machineSelect"></select>

    <button onclick="crea()">CREA</button>
</div>

<hr>

<div id="lista"></div>

<script>

    let machines = [];

    function caricaMacchine() {
        fetch('/machines')
            .then(r => r.json())
            .then(data => {
                machines = data;

                let select = document.getElementById("machineSelect");
                select.innerHTML = "";

                data.forEach(m => {
                    select.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    function crea() {

        let machineId = document.getElementById("machineSelect").value;

        let ordine = {
            numeroCommessa: document.getElementById("commessa").value,
            codiceParticolare: document.getElementById("codice").value,
            cliente: document.getElementById("cliente").value,
            quantita: parseInt(document.getElementById("quantita").value),
            tempoCicloSec: parseInt(document.getElementById("tempo").value),

            // 🔥 QUI LA DIFFERENZA
            macchina: { id: parseInt(machineId) }
        };

        fetch('/ordini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ordine)
        }).then(carica);
    }

    function carica() {
        fetch('/ordini')
            .then(r => r.json())
            .then(data => {

                lista.innerHTML = "";

                data.forEach(o => {
                    lista.innerHTML += `
                <div class="ordine">
                    <b>${o.numeroCommessa}</b><br>
                    Cliente: ${o.cliente || "-"}<br>
                    Macchina: ${o.macchina ? o.macchina.nome : "-"}<br>
                    Stato: ${o.stato}
                </div>
                `;
                });

            });
    }

    caricaMacchine();
    carica();

</script>

</body>
</html>
