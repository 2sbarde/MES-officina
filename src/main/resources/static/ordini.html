<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ordini</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        input, select, button {
            margin:5px;
            padding:5px;
        }
    </style>
</head>

<body>

<a href="/" style="color:white;">🏭 Dashboard</a>

<h1>📋 Nuovo Ordine</h1>

<input id="cliente" placeholder="Cliente">
<input id="commessa" placeholder="Commessa">
<input id="codice" placeholder="Codice">
<input id="materiale" placeholder="Materiale">
<input id="diametro" placeholder="Diametro">
<input id="quantita" type="number" placeholder="Quantità">
<input id="tempo" type="number" placeholder="Tempo ciclo (sec)">

<select id="macchina">
    <option value="T1">T1</option>
    <option value="T2">T2</option>
    <option value="T3">T3</option>
</select>

<br>

<button onclick="crea()">CREA ORDINE</button>

<script>

    function crea() {

        fetch('/ordini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({

                // 🔥 QUI STA IL CLIENTE
                cliente: document.getElementById("cliente").value,

                numeroCommessa: document.getElementById("commessa").value,
                codiceParticolare: document.getElementById("codice").value,
                materiale: document.getElementById("materiale").value,
                diametroBarra: document.getElementById("diametro").value,
                quantita: parseInt(document.getElementById("quantita").value),
                tempoCicloSec: parseInt(document.getElementById("tempo").value),
                macchina: document.getElementById("macchina").value

            })
        })
            .then(() => {
                alert("Ordine creato!");
            });
    }

</script>

</body>
</html>
