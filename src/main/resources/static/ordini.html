<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordini</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        /* FORM */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-row input,
        .form-row select {
            flex: 1;
            min-width: 120px;
            padding: 10px;
        }

        .form-row button {
            padding: 10px 20px;
            background: #00c853;
            border: none;
            color: white;
            font-weight: bold;
        }

        /* TABELLA */
        .ordine-row {
            display: grid;
            grid-template-columns: 40px 120px 120px 120px 120px 80px 80px 80px 100px 100px 120px;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size:14px;
        }

        .ordine-row.header {
            background:#222;
            font-weight:bold;
            cursor:pointer;
        }

        /* COLORI STATO */
        .CREATO { background:#333; }
        .IN_SETUP { background:orange; }
        .IN_PRODUZIONE { background:green; }
        .COMPLETATO { background:#555; }

        /* BOTTONI */
        button {
            padding: 5px;
        }

        .save-btn {
            background:#2196F3;
            color:white;
        }
    </style>
</head>

<body>

<h1>📋 Ordini</h1>
<a href="/" style="color:lightblue;">⬅ Torna alla Dashboard</a>

<!-- FORM -->
<div class="form-row">
    <input id="commessa" placeholder="Commessa">
    <input id="codice" placeholder="Codice">
    <input id="cliente" placeholder="Cliente">
    <input id="materiale" placeholder="Materiale">
    <input id="diametro" placeholder="Ø">
    <input id="quantita" type="number" placeholder="Qta">
    <input id="tempo" type="number" placeholder="Tempo">
    <select id="machineSelect"></select>
    <button onclick="crea()">CREA</button>
</div>

<hr>

<div id="lista"></div>

<script>

    let ordini = [];
    let sortKey = "id";
    let asc = true;

    /* MACCHINE */
    function caricaMacchine() {
        fetch('/machines')
            .then(r => r.json())
            .then(data => {
                machineSelect.innerHTML = "";
                data.forEach(m => {
                    machineSelect.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    /* CREA */
    function crea() {

        let ordine = {
            numeroCommessa: commessa.value,
            codiceParticolare: codice.value,
            cliente: cliente.value,
            materiale: materiale.value,
            diametroBarra: diametro.value,
            quantita: parseInt(quantita.value),
            tempoCicloSec: parseInt(tempo.value),
            macchina: { id: parseInt(machineSelect.value) }
        };

        fetch('/ordini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ordine)
        })
            .then(r => {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(() => carica())
            .catch(() => alert("Errore creazione"));
    }

    /* CARICA */
    function carica() {
        fetch('/ordini')
            .then(r => r.json())
            .then(data => {
                ordini = data;
                render();
            });
    }

    /* SORT */
    function sortBy(key) {
        asc = (sortKey === key) ? !asc : true;
        sortKey = key;
        render();
    }

    /* RENDER */
    function render() {

        let lista = document.getElementById("lista");

        let sorted = [...ordini].sort((a,b) => {
            let v1 = a[sortKey] || "";
            let v2 = b[sortKey] || "";

            if (typeof v1 === "string") v1 = v1.toLowerCase();
            if (typeof v2 === "string") v2 = v2.toLowerCase();

            return asc ? (v1 > v2 ? 1 : -1) : (v1 < v2 ? 1 : -1);
        });

        let html = "";

        html += `
    <div class="ordine-row header">
        <div onclick="sortBy('id')">ID</div>
        <div onclick="sortBy('numeroCommessa')">Commessa</div>
        <div onclick="sortBy('codiceParticolare')">Codice</div>
        <div onclick="sortBy('cliente')">Cliente</div>
        <div onclick="sortBy('materiale')">Materiale</div>
        <div onclick="sortBy('diametroBarra')">Ø</div>
        <div onclick="sortBy('quantita')">Qta</div>
        <div onclick="sortBy('tempoCicloSec')">Tempo</div>
        <div>Macchina</div>
        <div onclick="sortBy('stato')">Stato</div>
        <div></div>
    </div>
    `;

        sorted.forEach(o => {

            html += `
        <div class="ordine-row ${o.stato}">
            <div>${o.id}</div>

            <div contenteditable="true" onblur="update(${o.id}, 'numeroCommessa', this.innerText)">${o.numeroCommessa || ""}</div>

            <div contenteditable="true" onblur="update(${o.id}, 'codiceParticolare', this.innerText)">${o.codiceParticolare || ""}</div>

            <div contenteditable="true" onblur="update(${o.id}, 'cliente', this.innerText)">${o.cliente || ""}</div>

            <div contenteditable="true" onblur="update(${o.id}, 'materiale', this.innerText)">${o.materiale || ""}</div>

            <div contenteditable="true" onblur="update(${o.id}, 'diametroBarra', this.innerText)">${o.diametroBarra || ""}</div>

            <div contenteditable="true" onblur="update(${o.id}, 'quantita', this.innerText)">${o.quantita || ""}</div>

            <div contenteditable="true" onblur="update(${o.id}, 'tempoCicloSec', this.innerText)">${o.tempoCicloSec || ""}</div>

            <div>${o.macchina ? o.macchina.nome : "-"}</div>

            <div>${o.stato}</div>

            <div>
                <button onclick="elimina(${o.id})">❌</button>
            </div>
        </div>
        `;
        });

        lista.innerHTML = html;
    }

    /* UPDATE INLINE */
    function update(id, campo, valore) {

        fetch(`/ordini/${id}/update?campo=${campo}&valore=${valore}`, {
            method:'POST'
        });
    }

    /* ELIMINA */
    function elimina(id) {
        if (!confirm("Eliminare?")) return;
        fetch(`/ordini/${id}/elimina`, { method:'POST' })
            .then(() => carica());
    }

    caricaMacchine();
    carica();

</script>

</body>
</html>
