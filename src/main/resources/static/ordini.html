<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ordini</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }
        input, select { margin:5px; padding:5px; }
        button { margin:5px; padding:5px; }
        .card { background:#222; margin:10px; padding:10px; border-radius:10px; }
    </style>
</head>

<body>

<a href="/" style="color:white;">🏭 Dashboard</a>

<h1>📋 Ordini</h1>

<h3>Nuovo Ordine</h3>

<input id="commessa" placeholder="Commessa"><br>
<input id="codice" placeholder="Codice"><br>
<input id="quantita" type="number" placeholder="Quantità"><br>
<input id="tempo" type="number" placeholder="Tempo ciclo"><br>
<input id="materiale" placeholder="Materiale"><br>
<input id="diametro" type="number" placeholder="Diametro"><br>

<select id="macchina">
    <option>T1</option>
    <option>T2</option>
    <option>T3</option>
</select>

<br>
<button onclick="crea()">CREA</button>

<h3>Lista Ordini</h3>
<div id="lista"></div>

<script>

    function crea() {
        fetch('/ordini', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                numeroCommessa:commessa.value,
                codiceParticolare:codice.value,
                quantita:parseInt(quantita.value),
                tempoCicloSec:parseInt(tempo.value),
                materiale:materiale.value,
                diametroBarra:parseFloat(diametro.value),
                macchina:macchina.value
            })
        }).then(carica);
    }

    function carica() {
        fetch('/ordini')
            .then(r=>r.json())
            .then(data=>{
                lista.innerHTML="";

                data.forEach(o=>{
                    lista.innerHTML += `
            <div class="card">
                ${o.numeroCommessa} - ${o.macchina} - ${o.stato}
            </div>`;
                });
            });
    }

    carica();

</script>

</body>
</html>
