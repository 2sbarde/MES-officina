<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ordini</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        input, select { margin:5px; padding:5px; }
        button { margin:5px; padding:5px; }

        .card {
            background:#222;
            margin:10px;
            padding:10px;
            border-radius:10px;
        }

        .filtri {
            background:#333;
            padding:10px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<a href="/" style="color:white;">🏭 Dashboard</a>

<h1>📋 Ordini</h1>

<h3>Nuovo Ordine</h3>

<input id="commessa" placeholder="Commessa">
<input id="codice" placeholder="Codice">
<input id="quantita" type="number" placeholder="Quantità">
<input id="tempo" type="number" placeholder="Tempo ciclo">
<input id="materiale" placeholder="Materiale">
<input id="diametro" type="number" placeholder="Diametro">

<select id="macchina">
    <option>T1</option>
    <option>T2</option>
    <option>T3</option>
</select>

<button onclick="crea()">CREA</button>

<h3>🔎 Filtri</h3>

<div class="filtri">
    <input id="search" placeholder="Cerca..." onkeyup="carica()">

    <select id="filtroMacchina" onchange="carica()">
        <option value="">Tutte macchine</option>
        <option>T1</option>
        <option>T2</option>
        <option>T3</option>
    </select>

    <select id="filtroStato" onchange="carica()">
        <option value="">Tutti stati</option>
        <option>CREATO</option>
        <option>IN_SETUP</option>
        <option>IN_PRODUZIONE</option>
        <option>COMPLETATO</option>
    </select>
</div>

<h3>Lista Ordini</h3>
<div id="lista"></div>

<script>

    let tutti = [];

    function crea() {
        fetch('/ordini', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                numeroCommessa:commessa.value,
                codiceParticolare:codice.value,
                quantita:parseInt(quantita.value),
                tempoCicloSec:parseInt(tempo.value),
                materiale:materiale.value,
                diametroBarra:parseFloat(diametro.value),
                macchina:macchina.value
            })
        }).then(carica);
    }

    function elimina(id) {
        if (!confirm("Eliminare ordine?")) return;

        fetch(`/ordini/${id}/elimina`, {method:'POST'})
            .then(carica)
            .catch(()=> alert("❌ Non eliminabile (in produzione)"));
    }

    function modifica(id) {

        let nuovo = {
            numeroCommessa: prompt("Commessa"),
            codiceParticolare: prompt("Codice"),
            quantita: parseInt(prompt("Quantità")),
            tempoCicloSec: parseInt(prompt("Tempo ciclo")),
            materiale: prompt("Materiale"),
            diametroBarra: parseFloat(prompt("Diametro")),
            macchina: prompt("Macchina (T1/T2/T3)")
        };

        fetch(`/ordini/${id}/modifica`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(nuovo)
        }).then(carica);
    }

    function carica() {
        fetch('/ordini')
            .then(r=>r.json())
            .then(data=>{
                tutti = data;
                filtra();
            });
    }

    function filtra() {

        let searchVal = search.value.toLowerCase();
        let macchinaVal = filtroMacchina.value;
        let statoVal = filtroStato.value;

        lista.innerHTML = "";

        tutti
            .filter(o =>
                (!macchinaVal || o.macchina === macchinaVal) &&
                (!statoVal || o.stato === statoVal) &&
                (
                    o.numeroCommessa.toLowerCase().includes(searchVal) ||
                    o.codiceParticolare.toLowerCase().includes(searchVal)
                )
            )
            .forEach(o => {

                lista.innerHTML += `
        <div class="card">

            <b>${o.numeroCommessa}</b> (${o.stato})<br>

            Codice: ${o.codiceParticolare}<br>
            Macchina: ${o.macchina}<br>

            Materiale: ${o.materiale}<br>
            Ø ${o.diametroBarra}<br>

            Q: ${o.quantita} | Prod: ${o.pezziProdotti}<br>

            <button onclick="modifica(${o.id})">✏️ MODIFICA</button>
            <button onclick="elimina(${o.id})">❌ ELIMINA</button>

        </div>
        `;
            });
    }

    carica();

</script>

</body>
</html>
