<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordini</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        /* FORM */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-row input,
        .form-row select {
            flex: 1;
            min-width: 120px;
            padding: 10px;
        }

        .form-row button {
            padding: 10px 20px;
            background: #00c853;
            border: none;
            color: white;
            font-weight: bold;
        }

        /* TABELLA */
        .ordine-row {
            display: grid;
            grid-template-columns: 40px 120px 120px 120px 120px 80px 80px 80px 100px 100px 60px;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size:14px;
        }

        .ordine-row.header {
            background:#222;
            font-weight:bold;
        }

        .ordine-row button {
            padding: 5px;
        }
    </style>
</head>

<body>

<h1>📋 Ordini</h1>
<a href="/" style="color:lightblue;">⬅ Torna alla Dashboard</a>

<!-- 🔥 FORM COMPLETO -->
<div class="form-row">

    <input id="commessa" placeholder="Commessa">
    <input id="codice" placeholder="Codice">
    <input id="cliente" placeholder="Cliente">

    <input id="materiale" placeholder="Materiale">
    <input id="diametro" placeholder="Ø">

    <input id="quantita" type="number" placeholder="Qta">
    <input id="tempo" type="number" placeholder="Tempo">

    <select id="machineSelect"></select>

    <button onclick="crea()">CREA</button>

</div>

<hr>

<div id="lista"></div>

<script>

    function caricaMacchine() {
        fetch('/machines')
            .then(r => r.json())
            .then(data => {
                let select = document.getElementById("machineSelect");
                select.innerHTML = "";

                data.forEach(m => {
                    select.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    function crea() {

        let ordine = {
            numeroCommessa: commessa.value,
            codiceParticolare: codice.value,
            cliente: cliente.value,
            materiale: materiale.value,
            diametroBarra: diametro.value,
            quantita: parseInt(quantita.value),
            tempoCicloSec: parseInt(tempo.value),
            macchina: { id: parseInt(machineSelect.value) }
        };

        fetch('/ordini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ordine)
        })
            .then(r => {
                if (!r.ok) throw new Error("Errore creazione ordine");
                return r.json();
            })
            .then(() => carica())
            .catch(err => alert(err));
    }

    function carica() {
        fetch('/ordini')
            .then(r => r.json())
            .then(data => {

                let html = "";

                /* HEADER */
                html += `
            <div class="ordine-row header">
                <div>ID</div>
                <div>Commessa</div>
                <div>Codice</div>
                <div>Cliente</div>
                <div>Materiale</div>
                <div>Ø</div>
                <div>Qta</div>
                <div>Tempo</div>
                <div>Macchina</div>
                <div>Stato</div>
                <div></div>
            </div>
            `;

                /* DATI */
                data.forEach(o => {
                    html += `
                <div class="ordine-row">
                    <div>${o.id}</div>
                    <div>${o.numeroCommessa || "-"}</div>
                    <div>${o.codiceParticolare || "-"}</div>
                    <div>${o.cliente || "-"}</div>
                    <div>${o.materiale || "-"}</div>
                    <div>${o.diametroBarra || "-"}</div>
                    <div>${o.quantita || "-"}</div>
                    <div>${o.tempoCicloSec || "-"}</div>
                    <div>${o.macchina ? o.macchina.nome : "-"}</div>
                    <div>${o.stato}</div>
                    <div>
                        <button onclick="elimina(${o.id})">❌</button>
                    </div>
                </div>
                `;
                });

                document.getElementById("lista").innerHTML = html;
            });
    }

    function elimina(id) {
        if (!confirm("Sei sicuro?")) return;

        fetch(`/ordini/${id}/elimina`, { method:'POST' })
            .then(() => carica());
    }

    caricaMacchine();
    carica();

</script>

</body>
</html>
