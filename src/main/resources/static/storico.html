<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Storico</title>

  <style>
    body { background:#111; color:white; font-family:Arial; }

    input {
      padding:10px;
      margin:5px;
    }

    .row {
      display:grid;
      grid-template-columns:80px 120px 120px 120px 100px 100px;
      gap:10px;
      padding:10px;
      border-bottom:1px solid #333;
    }
  </style>
</head>

<body>

<h1>📊 Storico</h1>

<div>
  <input id="filtroCliente" placeholder="Cliente"oninput="render()">
  <input id="filtroCommessa" placeholder="Commessa"oninput="render()">
  <input id="filtroCodice" placeholder="Codice"oninput="render()">

</div>

<div id="lista"></div>

<script>

  let dati = [];

  function carica(){
    fetch('/ordini/storico')
            .then(r=>r.json())
            .then(data=>{
              dati = data;
              render();
            });
  }

  function render(){

    let fc = filtroCliente.value.toLowerCase();
    let fm = filtroCommessa.value.toLowerCase();
    let fcod = filtroCodice.value.toLowerCase();

    let html = "";

    dati
            .filter(o => {

              return (!fc || (o.cliente || "").toLowerCase().includes(fc))
                      && (!fm || (o.numeroCommessa || "").toLowerCase().includes(fm))
                      && (!fcod || (o.codiceParticolare || "").toLowerCase().includes(fcod));

            })
            .forEach(o => {

              html += `
<div class="row">
<div>${o.id}</div>
<div>${o.cliente || ""}</div>
<div>${o.numeroCommessa || ""}</div>
<div>${o.codiceParticolare || ""}</div>
<div>${o.pezziProdotti}/${o.quantita}</div>
<div>${o.dataChiusura || ""}</div>
</div>
`;

            });

    lista.innerHTML = html;
  }

  carica();

</script>

</body>
</html>
