<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storico</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #444;
      text-align: left;
    }

    th {
      background: #333;
    }

    .topbar {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>📊 Storico</h1>

<a href="/mobile.html" style="color:lightblue;">⬅ Torna alla Dashboard</a>

<div class="topbar">
  <input id="fCliente" placeholder="Filtro Cliente">
  <input id="fCodice" placeholder="Filtro Codice">
  <input id="fData" placeholder="Filtro Data (es: 2026)">

  <button onclick="carica()">🔍 Cerca</button>
</div>

<table>
  <thead>
  <tr>
    <th>Cliente</th>
    <th>Commessa</th>
    <th>Codice</th>
    <th>Materiale</th>
    <th>Ø</th>
    <th>Quantità</th>
    <th>Prodotti</th>
    <th>Macchina</th>
    <th>Chiusura</th>
  </tr>
  </thead>
  <tbody id="tabella"></tbody>
</table>

<script>

  function carica() {

    let cliente = document.getElementById("fCliente").value;
    let codice = document.getElementById("fCodice").value;
    let data = document.getElementById("fData").value;

    let url = "/ordini/storico?";

    if (cliente) url += "cliente=" + cliente + "&";
    if (codice) url += "codice=" + codice + "&";
    if (data) url += "data=" + data + "&";

    fetch(url)
            .then(r => r.json())
            .then(data => {

              tabella.innerHTML = "";

              data.forEach(o => {
                tabella.innerHTML += `
                <tr>
                    <td>${o.cliente || "-"}</td>
                    <td>${o.numeroCommessa}</td>
                    <td>${o.codiceParticolare}</td>
                    <td>${o.materiale}</td>
                    <td>${o.diametroBarra}</td>
                    <td>${o.quantita}</td>
                    <td>${o.pezziProdotti}</td>
                    <td>${o.macchina ? o.macchina.nome : "-"}</td>
                    <td>${o.dataChiusura || "-"}</td>
                </tr>
                `;
              });

            });
  }

  // carica iniziale
  carica();

</script>

</body>
</html>
