<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Storico</title>

  <style>
    body {
      background:#0f0f0f;
      color:white;
      font-family:Arial;
      margin:10px;
    }

    h1 {
      text-align:center;
      margin-bottom:15px;
    }

    #kpi {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    .kpi-box {
      background:#222;
      padding:12px;
      border-radius:10px;
      min-width:120px;
    }

    .kpi-box b {
      font-size:18px;
    }

    .filtri {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:15px;
    }

    input {
      padding:10px;
      border-radius:6px;
      border:none;
      flex:1;
      min-width:120px;
    }

    .wrapper {
      overflow-x:auto;
    }

    .row {
      display:grid;
      grid-template-columns:60px 120px 150px 150px 150px 150px 120px;
      gap:10px;
      padding:10px;
      border-bottom:1px solid #333;
      align-items:center;
      min-width:900px;
    }

    .header {
      background:#222;
      font-weight:bold;
      position:sticky;
      top:0;
      z-index:2;
    }

    .row:hover {
      background:#1a1a1a;
    }

    .progress {
      background:#222;
      border-radius:8px;
      overflow:hidden;
      height:10px;
    }

    .bar {
      height:100%;
    }

    .completato {
      background:#1e1e1e;
    }
    .topnav {
      position: sticky;
      top: 0;
      background: #020617;
      padding: 12px;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 1000;
      border-bottom: 1px solid #1e293b;
    }

    .topnav a {
      color: #e2e8f0;
      text-decoration: none;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .topnav a:hover {
      background: #1e293b;
    }

    .topnav a:hover {
      background: #1e293b;
    }
  </style>
</head>

<body>
<div class="topnav">
  <a href="/index.html">🏭 Dashboard</a>
  <a href="/ordini.html">📋 Ordini</a>
  <a href="/sospesi.html">⏸ Sospesi</a>
  <a href="/storico.html">📊 Storico</a>
</div>

<h1>📊 Storico</h1>
<div style="text-align:center; margin-bottom:10px;">

</div>

<div id="kpi"></div>

<div style="margin-bottom:10px;">
  <label>Mese:</label>
  <select id="mese">
    <option value="1">Gen</option>
    <option value="2">Feb</option>
    <option value="3">Mar</option>
    <option value="4">Apr</option>
    <option value="5">Mag</option>
    <option value="6">Giu</option>
    <option value="7">Lug</option>
    <option value="8">Ago</option>
    <option value="9">Set</option>
    <option value="10">Ott</option>
    <option value="11">Nov</option>
    <option value="12">Dic</option>
  </select>

  <label>Anno:</label>
  <input id="anno" type="number" value="2026" style="width:80px;">

  <button onclick="caricaStorico()">🔍 Filtra</button>
  <button onclick="scaricaExcel()">📥 Excel</button>
</div>


<div class="filtri">
  <input id="filtroCliente" placeholder="Cliente" oninput="render()">
  <input id="filtroCommessa" placeholder="Commessa" oninput="render()">
  <input id="filtroCodice" placeholder="Codice" oninput="render()">
</div>

<div class="wrapper">
  <div id="lista"></div>
</div>

<script>
  document.getElementById("mese").value = new Date().getMonth() + 1;
  document.getElementById("anno").value = new Date().getFullYear();

  let dati = [];

  function getFiltro() {
    return {
      mese: document.getElementById("mese").value,
      anno: document.getElementById("anno").value
    }
  }
  function scaricaExcel() {
    const f = getFiltro()
    window.open(`/ordini/export?mese=${f.mese}&anno=${f.anno}`)
  }


  function caricaStorico() {
    const f = getFiltro()

    fetch(`/ordini/storico?mese=${f.mese}&anno=${f.anno}`)
            .then(res => res.json())
            .then(data => {
              dati = data;
              calcolaKPI();
              render();
            })
  }

  function calcolaKPI(){

    let ordini = dati.length;
    let pezzi = 0;
    let tempo = 0;

    dati.forEach(o => {
      pezzi += (o.pezziProdotti || 0);

      if(o.tempoCicloSec && o.pezziProdotti){
        tempo += o.tempoCicloSec * o.pezziProdotti;
      }
    });

    let ore = Math.floor(tempo / 3600);
    let minuti = Math.floor((tempo % 3600) / 60);

    document.getElementById("kpi").innerHTML = `
    <div class="kpi-box">✔ Ordini<br><b>${ordini}</b></div>
    <div class="kpi-box">✔ Pezzi<br><b>${pezzi}</b></div>
    <div class="kpi-box">⏱ Tempo<br><b>${ore}h ${minuti}m</b></div>
  `;
  }

  function render(){

    let fc = (filtroCliente.value || "").toLowerCase();
    let fm = (filtroCommessa.value || "").toLowerCase();
    let fcod = (filtroCodice.value || "").toLowerCase();

    let html = `
<div class="row header">
<div>ID</div>
<div>Macchina</div>
<div>Cliente</div>
<div>Commessa</div>
<div>Codice</div>
<div>Produzione</div>
<div>Chiusura</div>
</div>
`;

    dati
            .filter(o =>
                    (!fc || (o.cliente || "").toLowerCase().includes(fc)) &&
                    (!fm || (o.numeroCommessa || "").toLowerCase().includes(fm)) &&
                    (!fcod || (o.codiceParticolare || "").toLowerCase().includes(fcod))
            )
            .forEach(o => {

              let perc = 0;
              if(o.quantita > 0){
                perc = Math.min(100, Math.round((o.pezziProdotti / o.quantita)*100));
              }

              let color="#16a34a";
              if(perc < 30) color="#ef4444";
              else if(perc < 70) color="#f59e0b";

              let data = o.dataChiusura
                      ? new Date(o.dataChiusura).toLocaleDateString("it-IT")
                      : "";

              let macchina = o.macchina?.nome || "-";

              html += `
<div class="row completato">

<div>${o.id}</div>
<div>${macchina}</div>
<div>${o.cliente || ""}</div>
<div>${o.numeroCommessa || ""}</div>
<div>${o.codiceParticolare || ""}</div>

<div>
${o.pezziProdotti}/${o.quantita}
<div class="progress">
<div class="bar" style="width:${perc}%; background:${color};"></div>
</div>
</div>

<div>${data}</div>

</div>
`;
            });

    lista.innerHTML = html;
  }

  caricaStorico();

</script>

</body>
</html>
