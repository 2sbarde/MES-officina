<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Storico</title>

  <style>
    body {
      background:#0f0f0f;
      color:white;
      font-family:Arial;
      margin:10px;
    }

    h1 {
      text-align:center;
      margin-bottom:15px;
    }

    #kpi {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    .kpi-box {
      background:#222;
      padding:12px;
      border-radius:10px;
      min-width:120px;
    }

    .kpi-box b {
      font-size:18px;
    }

    .filtri {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:15px;
    }

    input {
      padding:10px;
      border-radius:6px;
      border:none;
      flex:1;
      min-width:120px;
    }

    .wrapper {
      overflow-x:auto;
    }

    .row {
      display:grid;
      grid-template-columns:60px 120px 150px 150px 150px 150px 120px;
      gap:10px;
      padding:10px;
      border-bottom:1px solid #333;
      align-items:center;
      min-width:900px;
    }

    .header {
      background:#222;
      font-weight:bold;
      position:sticky;
      top:0;
      z-index:2;
    }

    .row:hover {
      background:#1a1a1a;
    }

    .progress {
      background:#222;
      border-radius:8px;
      overflow:hidden;
      height:10px;
    }

    .bar {
      height:100%;
    }

    .completato {
      background:#1e1e1e;
    }

  </style>
</head>

<body>

<h1>📊 Storico</h1>
<div style="text-align:center; margin-bottom:10px;">
  <button onclick="exportCSV()" style="padding:10px 20px; border:none; border-radius:8px; background:#00c853; color:white; font-weight:bold;">
    ⬇️ Esporta Excel
  </button>
</div>

<div id="kpi"></div>

<div class="filtri">
  <input id="filtroCliente" placeholder="Cliente" oninput="render()">
  <input id="filtroCommessa" placeholder="Commessa" oninput="render()">
  <input id="filtroCodice" placeholder="Codice" oninput="render()">
</div>

<div class="wrapper">
  <div id="lista"></div>
</div>

<script>

  let dati = [];

  function carica(){
    fetch('/ordini/storico')
            .then(r=>r.json())
            .then(data=>{
              dati = data;
              calcolaKPI();
              render();
            });
  }

  function calcolaKPI(){

    let ordini = dati.length;
    let pezzi = 0;
    let tempo = 0;

    dati.forEach(o => {
      pezzi += (o.pezziProdotti || 0);

      if(o.tempoCicloSec && o.pezziProdotti){
        tempo += o.tempoCicloSec * o.pezziProdotti;
      }
    });

    let ore = Math.floor(tempo / 3600);
    let minuti = Math.floor((tempo % 3600) / 60);

    document.getElementById("kpi").innerHTML = `
    <div class="kpi-box">✔ Ordini<br><b>${ordini}</b></div>
    <div class="kpi-box">✔ Pezzi<br><b>${pezzi}</b></div>
    <div class="kpi-box">⏱ Tempo<br><b>${ore}h ${minuti}m</b></div>
  `;
  }

  function render(){

    let fc = filtroCliente.value.toLowerCase();
    let fm = filtroCommessa.value.toLowerCase();
    let fcod = filtroCodice.value.toLowerCase();

    let html = `
<div class="row header">
<div>ID</div>
<div>Macchina</div>
<div>Cliente</div>
<div>Commessa</div>
<div>Codice</div>
<div>Produzione</div>
<div>Chiusura</div>
</div>
`;

    dati
            .filter(o =>
                    (!fc || (o.cliente || "").toLowerCase().includes(fc)) &&
                    (!fm || (o.numeroCommessa || "").toLowerCase().includes(fm)) &&
                    (!fcod || (o.codiceParticolare || "").toLowerCase().includes(fcod))
            )
            .forEach(o => {

              let perc = 0;
              if(o.quantita > 0){
                perc = Math.min(100, Math.round((o.pezziProdotti / o.quantita)*100));
              }

              let color="#00c853";
              if(perc < 30) color="red";
              else if(perc < 70) color="orange";

              let data = o.dataChiusura
                      ? new Date(o.dataChiusura).toLocaleDateString()
                      : "";

              let macchina = o.macchina?.nome || "-";

              html += `
<div class="row completato">

<div>${o.id}</div>
<div>${macchina}</div>
<div>${o.cliente || ""}</div>
<div>${o.numeroCommessa || ""}</div>
<div>${o.codiceParticolare || ""}</div>

<div>
${o.pezziProdotti}/${o.quantita}
<div class="progress">
<div class="bar" style="width:${perc}%; background:${color};"></div>
</div>
</div>

<div>${data}</div>

</div>
`;
            });

    lista.innerHTML = html;
  }

  carica();
  function exportCSV(){

    let csv = "ID,Macchina,Cliente,Commessa,Codice,Pezzi,Quantita,Data\n";

    dati.forEach(o => {

      let macchina = o.macchina?.nome || "";
      let data = o.dataChiusura
              ? new Date(o.dataChiusura).toLocaleDateString()
              : "";

      csv += `${o.id},${macchina},${o.cliente || ""},${o.numeroCommessa || ""},${o.codiceParticolare || ""},${o.pezziProdotti || 0},${o.quantita || 0},${data}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "storico.csv";
    a.click();

    window.URL.revokeObjectURL(url);
  }
</script>
<div class="navbar">
  <button onclick="location.href='/mobile.html'">HOME</button>
  <button onclick="location.href='/mobile-ordini.html'">CREA</button>
  <button onclick="location.href='/sospesi.html'">SOSPESI</button>
  <button onclick="location.href='/storico.html'">STORICO</button>
  <button onclick="location.href='/mobile-lista.html'">ORDINI</button>
</div>
</body>
</html>
