<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Storico</title>

  <style>
    body { background:#111; color:white; font-family:Arial; }

    .header {
      display:grid;
      grid-template-columns: repeat(9, 1fr);
      background:#333;
      padding:10px;
      margin:10px;
      border-radius:10px;
      font-weight:bold;
    }

    .ordine {
      display:grid;
      grid-template-columns: repeat(9, 1fr);
      background:#222;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<a href="/" style="color:white;">🏭 Dashboard</a>

<h1>📊 Storico</h1>

<div class="header">
  <div>Cliente</div>
  <div>Commessa</div>
  <div>Codice</div>
  <div>Materiale</div>
  <div>Ø</div>
  <div>Quantità</div>
  <div>Prodotti</div>
  <div>Macchina</div>
  <div>Chiusura</div>
</div>

<div id="storico"></div>

<script>

  function formatData(data) {
    if (!data) return "-";
    let d = new Date(data);
    return d.toLocaleDateString("it-IT") + " " +
            d.toLocaleTimeString("it-IT", {hour:'2-digit', minute:'2-digit'});
  }

  function carica() {

    fetch('/ordini/storico')
            .then(r => r.json())
            .then(data => {

              const storico = document.getElementById("storico");

              storico.innerHTML = "";

              data.forEach(o => {

                storico.innerHTML += `
          <div class="ordine">

              <div>${o.cliente || "-"}</div>
              <div><b>${o.numeroCommessa}</b></div>
              <div>${o.codiceParticolare}</div>
              <div>${o.materiale}</div>
              <div>Ø ${o.diametroBarra}</div>
              <div>${o.quantita}</div>
              <div>${o.pezziProdotti}</div>
              <div>${o.macchina}</div>
              <div>${formatData(o.dataChiusura)}</div>

          </div>
        `;
              });

            });
  }

  carica();

</script>

</body>
</html>
