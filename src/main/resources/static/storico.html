<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Storico</title>
</head>

<body style="background:#111; color:white; font-family:Arial;">

<h1>Storico</h1>

<div id="storico"></div>

<script>

  function carica() {

    fetch('/ordini/storico')
            .then(r => r.json())
            .then(data => {

              console.log("DATI:", data); // 👈 DEBUG

              const div = document.getElementById("storico");

              div.innerHTML = "";

              data.forEach(o => {

                div.innerHTML += `
          <div style="margin:10px; padding:10px; background:#222;">
            ${o.numeroCommessa} |
            ${o.codiceParticolare} |
            chiuso: ${o.dataChiusura}
          </div>
        `;
              });

            })
            .catch(err => {
              console.error("ERRORE:", err);
            });
  }

  carica();

</script>

</body>
</html>
