<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta charset="UTF-8">
    <title>Ordini Sospesi MES</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px 10px 80px 10px;
        }

        .topbar {
            background: #020617;
            padding: 14px;
            text-align: center;
            font-weight: bold;
        }

        .card {
            background: #1e293b;
            border-radius: 14px;
            padding: 16px;
            margin: 12px 0;
        }

        .sub { font-size:13px; opacity:0.8; }

        button {
            width:100%;
            margin-top:6px;
            padding:10px;
            border-radius:10px;
            border:none;
            font-weight:bold;
        }

        .btn-riprendi { background:#16a34a; }
        .btn-del { background:#dc2626; }

        .navbar {
            position: fixed;
            bottom: 0; /* 🔥 attaccata davvero */
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 420px;
            background: #020617;
            border-radius: 22px;
            display: flex;
            justify-content: space-between;

            padding: 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom)); /* 🔥 spazio iPhone */

            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 9999;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 20px;
            padding: 6px 4px;
            border-radius: 14px;
        }

        .nav-item span {
            font-size: 10px;
            margin-top: 3px;
        }

        .nav-item.active {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .nav-item.active span {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="topbar">⏸ SOSPESI</div>

<div id="lista"></div>

<script>
    const lista = document.getElementById("lista");

    function carica(){
        fetch('/ordini')
            .then(r=>r.json())
            .then(data=>{

                let html="";

                data.filter(o=>o.stato==="SOSPESO")
                    .forEach(o=>{

                        html+=`
<div class="card">

<div><b>${o.numeroCommessa||"-"}</b></div>
<div class="sub">${o.cliente||"-"}</div>
<div class="sub">${o.codiceParticolare||"-"}</div>

<div>${o.pezziProdotti||0}/${o.quantita||0}</div>

<button class="btn-riprendi" onclick="riprendi(${o.id})">▶ RIPRENDI</button>
<button class="btn-del" onclick="elimina(${o.id})">ELIMINA</button>

</div>
`;
                    });

                lista.innerHTML = html;
            });
    }

    function riprendi(id){
        fetch(`/ordini/${id}/riprendi`,{method:'POST'}).then(carica);
    }

    function elimina(id){
        fetch(`/ordini/${id}/elimina`,{method:'POST'}).then(carica);
    }

    carica();
</script>

<div class="navbar">

    <div class="nav-item" onclick="location.href='/mobile.html'">📊<span>Dashboard</span></div>
    <div class="nav-item" onclick="location.href='/mobile-lista.html'">📋<span>Ordini</span></div>
    <div class="nav-item" onclick="location.href='/mobile-ordini.html'">➕<span>Crea</span></div>
    <div class="nav-item active" onclick="location.href='/mobile-sospesi.html'">⏸<span>Sospesi</span></div>
    <div class="nav-item" onclick="location.href='/mobile-storico.html'">📈<span>Storico</span></div>

</div>

</body>
</html>
