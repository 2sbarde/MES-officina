<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial;
            margin: 0;
            padding: 10px;
            padding-bottom: 80px;
        }

        .topbar {
            background: #020617;
            padding: 14px;
            text-align: center;
            font-weight: bold;
        }

        .card {
            background: #1e293b;
            border-radius: 14px;
            padding: 16px;
            margin: 12px 0;
        }

        .sub { font-size:13px; opacity:0.8; }

        button {
            width:100%;
            margin-top:6px;
            padding:10px;
            border-radius:10px;
            border:none;
            font-weight:bold;
        }

        .btn-riprendi { background:#16a34a; }
        .btn-del { background:#dc2626; }

        .navbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #020617;
            display: flex;
            gap: 4px;
            padding: 6px 8px;
            border-radius: 12px;
        }
        .navbar button {
            background: #1e293b;
            font-size: 11px;
            padding: 4px 8px;
        }
    </style>
</head>

<body>

<div class="topbar">⏸ SOSPESI</div>

<div id="lista"></div>

<script>
    function carica(){
        fetch('/ordini')
            .then(r=>r.json())
            .then(data=>{

                let html="";

                data.filter(o=>o.stato==="SOSPESO")
                    .forEach(o=>{

                        html+=`
<div class="card">

<div><b>${o.numeroCommessa||"-"}</b></div>
<div class="sub">${o.cliente||"-"}</div>
<div class="sub">${o.codiceParticolare||"-"}</div>

<div>${o.pezziProdotti||0}/${o.quantita||0}</div>

<button class="btn-riprendi" onclick="riprendi(${o.id})">▶ RIPRENDI</button>
<button class="btn-del" onclick="elimina(${o.id})">ELIMINA</button>

</div>
`;
                    });

                lista.innerHTML=html;
            });
    }

    function riprendi(id){
        fetch(`/ordini/${id}/riprendi`,{method:'POST'}).then(carica);
    }

    function elimina(id){
        fetch(`/ordini/${id}/elimina`,{method:'POST'}).then(carica);
    }

    carica();
</script>

<div class="navbar">
    <button onclick="location.href='/mobile.html'">HOME</button>
    <button onclick="location.href='/mobile-ordini.html'">CREA</button>
    <button onclick="location.href='/mobile-sospesi.html'">SOSP</button>
    <button onclick="location.href='/mobile-storico.html'">STO</button>
    <button onclick="location.href='/mobile-lista.html'">ORD</button>
</div>

</body>
</html>
