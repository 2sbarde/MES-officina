<!DOCTYPE html>
<html lang="it">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Ordini Attivi MES</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px 10px 80px 10px;
        }

        .topbar {
            background: #020617;
            padding: 14px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .navbar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 420px;
            background: #020617;
            border-radius: 22px;
            display: flex;
            justify-content: space-between;
            padding: 8px;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
        }

        .nav-item.active {
            color: #f59e0b;
        }

        select {
            width:100%;
            padding:12px;
            border-radius:10px;
            margin-bottom:10px;
            background:#334155;
            color:white;
            border:none;
        }
    </style>
</head>

<body>

<div class="topbar">📋 ORDINI</div>

<select id="filtroMacchina" onchange="carica()">
    <option value="">Tutte le macchine</option>
    <option value="1">T1</option>
    <option value="2">T2</option>
    <option value="3">T3</option>
</select>

<div id="lista"></div>

<script>
    function carica(){
        fetch('/ordini')
            .then(function(r){ return r.json(); })
            .then(function(data){

                var filtro = document.getElementById("filtroMacchina").value;
                var gruppi = {};
                var html = "";

                data.forEach(function(o){

                    if(o.stato === "COMPLETATO") return;

                    if(filtro && (!o.macchina || o.macchina.id != filtro)) return;

                    var macchina = o.macchina ? "T" + o.macchina.id : "Senza macchina";

                    if(!gruppi[macchina]) gruppi[macchina] = [];

                    gruppi[macchina].push(o);
                });

                var ordineMacchine = ["T1","T2","T3","Senza macchina"];

                ordineMacchine.forEach(function(macchina){

                    if(!gruppi[macchina]) return;

                    html += '<h2 style="margin-top:15px;">' + macchina + '</h2>';
                    gruppi[macchina].sort(function(a, b){

                        function priorita(stato){
                            if(stato === "IN_PRODUZIONE") return 1;
                            if(stato === "IN_SETUP") return 2;
                            return 3;
                        }

                        return priorita(a.stato) - priorita(b.stato);
                    });

                    gruppi[macchina].forEach(function(o){

                        var colore = "#1e293b";
                        if (o.stato === "IN_SETUP") colore = "#f59e0b";
                        if (o.stato === "IN_PRODUZIONE") colore = "#16a34a";

                        html += `
<div style="
    background:${colore};
    border-radius:18px;
    padding:16px;
    margin-bottom:16px;          /* 🔥 SPAZIO TRA ORDINI */
    box-shadow:0 4px 10px rgba(0,0,0,0.3); /* 🔥 STACCO VISIVO */
    border: 1px solid rgba(255,255,255,0.05);
">

<<div style="padding:16px;">

    <div style="font-weight:bold; font-size:18px;">
        ${o.numeroCommessa || "-"}
    </div>

    <div style="margin-top:4px;">
        ${o.cliente || "-"}
    </div>

    <div style="margin-top:2px; opacity:0.8;">
        ${o.codiceParticolare || "-"}
    </div>

    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; font-size:13px;">
        <span>Macchina: T${o.macchina ? o.macchina.id : "-"}</span>
        <span>Quantità: ${o.quantita || 0}</span>
    </div>

    <div style="margin-top:6px; display:flex; gap:10px; flex-wrap:wrap; font-size:13px;">
        <span>Materiale: ${o.materiale || "-"}</span>
        ${o.diametroBarra ? `<span>Diametro: ${o.diametroBarra}</span>` : ""}
    </div>

    <div style="margin-top:10px; font-weight:bold; font-size:16px;">
        Produzione: ${o.pezziProdotti || 0} / ${o.quantita || 0}
    </div>

</div>

</div>

<div style="opacity:0.8; margin-top:6px;">
    ${o.cliente||"-"}
</div>

<div>
    ${o.codiceParticolare || "-"}
</div>

<div style="font-size:13px; opacity:0.8;">
    ${o.denominazione || ""}
</div>

<div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
    <span style="background:#020617; padding:6px 10px; border-radius:8px; font-size:12px;">
        ${o.materiale || "-"}
    </span>

    ${o.diametroBarra ? `
    <span style="background:#020617; padding:6px 10px; border-radius:8px; font-size:12px;">
        Ø ${o.diametroBarra}
    </span>
    ` : ""}
</div>

<div style="margin-top:10px; font-weight:bold;">
    ${o.pezziProdotti||0}/${o.quantita||0}
</div>

<div style="display:flex; gap:8px; margin-top:14px;">
    ${o.stato==="CREATO" ? `
    <button style="flex:1; background:#f59e0b;" onclick="setup(${o.id})">SETUP</button>
    ` : ""}

    ${o.stato==="IN_SETUP" ? `
    <button style="flex:1; background:#16a34a;" onclick="start(${o.id})">START</button>
    ` : ""}

    <button style="flex:1; background:#dc2626;" onclick="elimina(${o.id})">✖</button>
</div>

<div style="margin-top:10px; font-size:12px;">
    ${o.stato}
</div>

</div>
`;
                    });

                });

                document.getElementById("lista").innerHTML = html;
            });
    }

    function setup(id){
        fetch('/ordini/' + id + '/setup',{method:'POST'}).then(carica);
    }

    function start(id){
        fetch('/ordini/' + id + '/start',{method:'POST'}).then(carica);
    }

    function elimina(id){
        fetch('/ordini/' + id + '/elimina',{method:'POST'}).then(carica);
    }

    carica();
    setInterval(carica, 5000);
</script>
<div class="navbar">

    <div class="nav-item" onclick="location.href='mobile.html'">
        <i data-lucide="bar-chart-3"></i>
        <div>Dashboard</div>
    </div>

    <div class="nav-item active" onclick="location.href='mobile-lista.html'">
        <i data-lucide="clipboard-list"></i>
        <div>Ordini</div>
    </div>

    <div class="nav-item" onclick="location.href='mobile-stats.html'">
        <i data-lucide="pie-chart"></i>
        <div>Stats</div>
    </div>

    <div class="nav-item" onclick="location.href='mobile-sospesi.html'">
        <i data-lucide="pause-circle"></i>
        <div>Sospesi</div>
    </div>

    <div class="nav-item" onclick="location.href='mobile-storico.html'">
        <i data-lucide="line-chart"></i>
        <div>Storico</div>
    </div>

</div>
<script>
    lucide.createIcons();
</script>


</body>
</html>
