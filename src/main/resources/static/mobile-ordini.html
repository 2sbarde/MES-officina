<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ordini</title>

    <style>
        body {
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            margin:10px;
        }

        /* FORM */
        .form-row {
            display:flex;
            flex-direction:column;
            gap:10px;
            margin-bottom:20px;
        }

        .form-row input, .form-row select {
            padding:12px;
            font-size:16px;
            border-radius:8px;
            border:none;
        }

        /* BUTTON */
        button {
            padding:12px;
            background:#00c853;
            border:none;
            color:white;
            font-weight:bold;
            border-radius:8px;
        }

        /* CARD */
        .ordine-row {
            display:flex;
            flex-direction:column;
            gap:10px;
            padding:14px;
            border-radius:14px;
            margin-bottom:14px;
            box-shadow:0 0 10px #000;
        }

        /* RIGHE */
        .row-line {
            display:flex;
            justify-content:space-between;
            font-size:14px;
        }

        .label {
            color:#aaa;
        }

        .value {
            font-weight:bold;
        }

        /* STATI */
        .CREATO { background:#333; }
        .IN_SETUP { background:#ff9800; }
        .IN_PRODUZIONE { background:#00c853; }

        /* PROGRESS */
        .progress {
            background:#222;
            border-radius:8px;
            overflow:hidden;
            height:12px;
            margin-top:6px;
        }

        .bar {
            height:100%;
        }

        /* SCADENZE */
        .ritardo { background:#c62828 !important; }
        .urgente { background:#ff9800 !important; }

    </style>
</head>

<body>

<h2>📋 Ordini</h2>
<a href="/" style="color:lightblue;">⬅ Dashboard</a>

<div class="form-row">
    <input id="commessa" placeholder="Commessa">
    <input id="codice" placeholder="Codice">
    <input id="cliente" placeholder="Cliente">
    <input id="materiale" placeholder="Materiale">
    <input id="diametro" placeholder="Ø">
    <input id="quantita" type="number" placeholder="Quantità">
    <input id="tempo" type="number" placeholder="Tempo ciclo">
    <input id="scadenza" type="date">
    <input id="priorita" type="number" placeholder="Priorità">

    <select id="machineSelect"></select>

    <button onclick="crea()">CREA ORDINE</button>
</div>

<hr>

<div id="lista"></div>

<script>

    function caricaMacchine(){
        fetch('/macchine')
            .then(r=>r.json())
            .then(data=>{
                machineSelect.innerHTML="";
                data.forEach(m=>{
                    machineSelect.innerHTML+=`<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    function crea(){
        let ordine = {
            numeroCommessa: commessa.value,
            codiceParticolare: codice.value,
            cliente: cliente.value,
            materiale: materiale.value,
            diametroBarra: diametro.value,
            quantita: parseInt(quantita.value),
            tempoCicloSec: parseInt(tempo.value),
            dataScadenza: scadenza.value,
            priorita: parseInt(priorita.value || 0),
            macchina:{id:parseInt(machineSelect.value)}
        };

        fetch('/ordini',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(ordine)
        }).then(()=>carica());
    }

    function carica(){
        fetch('/ordini')
            .then(r=>r.json())
            .then(data=>render(data));
    }

    function render(data){

        let html="";

        data
            .filter(o=>o.stato!=="COMPLETATO")
            .sort((a,b)=>{

                let pa = a.priorita ?? 999;
                let pb = b.priorita ?? 999;

                if(pa !== pb) return pa - pb;

                let da = a.dataScadenza ? new Date(a.dataScadenza) : new Date(9999999999999);
                let db = b.dataScadenza ? new Date(b.dataScadenza) : new Date(9999999999999);

                return da - db;
            })
            .forEach(o=>{

                let classe="";
                if(o.dataScadenza){
                    let diff = (new Date(o.dataScadenza) - new Date())/(1000*60*60*24);
                    if(diff < 0) classe="ritardo";
                    else if(diff < 2) classe="urgente";
                }

// 🔥 PROGRESS
                let perc = 0;
                if(o.quantita > 0){
                    perc = Math.min(100, Math.round((o.pezziProdotti / o.quantita)*100));
                }

                let color="#00c853";
                if(perc < 30) color="red";
                else if(perc < 70) color="orange";

                html+=`
<div class="ordine-row ${o.stato} ${classe}">

<div class="row-line"><span class="label">ID</span><span class="value">${o.id}</span></div>

<div class="row-line"><span class="label">Commessa</span>
<span class="value" contenteditable onblur="update(${o.id},'numeroCommessa',this.innerText)">${o.numeroCommessa||""}</span></div>

<div class="row-line"><span class="label">Cliente</span>
<span class="value" contenteditable onblur="update(${o.id},'cliente',this.innerText)">${o.cliente||""}</span></div>

<div class="row-line"><span class="label">Produzione</span>
<span class="value">${o.pezziProdotti||0}/${o.quantita||0}</span></div>

<div class="progress">
<div class="bar" style="width:${perc}%; background:${color};"></div>
</div>

<div style="text-align:right; font-size:12px;">${perc}%</div>

<div class="row-line"><span class="label">Priorità</span>
<span class="value" contenteditable onblur="update(${o.id},'priorita',this.innerText)">${o.priorita||0}</span></div>

<div class="row-line"><span class="label">Stato</span>
<span class="value">${o.stato}</span></div>

<button onclick="elimina(${o.id})">❌ Elimina</button>

</div>
`;
            });

        lista.innerHTML=html;
    }

    function update(id,campo,valore){
        fetch(`/ordini/${id}/update?campo=${campo}&valore=${valore}`,{method:'POST'});
    }

    function elimina(id){
        if(!confirm("Eliminare?"))return;
        fetch(`/ordini/${id}/elimina`,{method:'POST'}).then(()=>carica());
    }

    caricaMacchine();
    carica();

</script>

</body>
</html>
