<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nuovo Ordine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background:#111;
            color:white;
            font-family:Arial;
            margin:0;
            padding:10px;
            padding-bottom:80px;
        }

        input, select {
            width:100%;
            padding:16px;
            margin-top:10px;
            font-size:18px;
            border-radius:12px;
            border:none;
        }

        button {
            width:100%;
            padding:18px;
            margin-top:10px;
            font-size:18px;
            border:none;
            border-radius:12px;
        }

        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
    </style>
</head>

<body>

<h1>➕ Nuovo Ordine</h1>

<input id="commessa" placeholder="Commessa">
<input id="codice" placeholder="Codice">
<input id="cliente" placeholder="Cliente">
<input id="materiale" placeholder="Materiale">
<input id="diametro" placeholder="Diametro">

<input id="quantita" type="number" placeholder="Quantità">
<input id="tempo" type="number" placeholder="Tempo ciclo">

<select id="machineSelect"></select>

<button onclick="crea()">CREA</button>

<script>

    function caricaMacchine() {
        fetch('/macchine') // 🔥 FIX QUI
            .then(r => r.json())
            .then(data => {
                let select = document.getElementById("machineSelect");

                select.innerHTML = ""; // 🔥 reset

                data.forEach(m => {
                    select.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    function crea() {

        let ordine = {
            numeroCommessa: commessa.value,
            codiceParticolare: codice.value,
            cliente: cliente.value,
            materiale: materiale.value,
            diametroBarra: diametro.value,
            quantita: parseInt(quantita.value),
            tempoCicloSec: parseInt(tempo.value),
            macchina: { id: parseInt(machineSelect.value) }
        };

        fetch('/ordini', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(ordine)
        }).then(()=>{
            alert("Creato");
            window.location.href="/mobile.html"; // 🔥 miglioria UX
        });
    }

    function goDash() { window.location.href="/mobile.html"; }
    function goOrdini() { window.location.href="/mobile-ordini.html"; }
    function goStorico() { window.location.href="/storico.html"; }

    caricaMacchine();

</script>

<div class="navbar">
    <button onclick="goDash()">🏠</button>
    <button onclick="goOrdini()">➕</button>
    <button onclick="goStorico()">📊</button>
</div>

</body>
</html>
