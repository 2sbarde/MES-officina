<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuovo Ordine</title>

    <style>
        body {
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            margin:0;
            padding:15px;
        }

        h1 {
            text-align:center;
            margin-bottom:20px;
        }

        .container {
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        input, select {
            width:100%;
            padding:16px;
            font-size:16px;
            border-radius:10px;
            border:none;
        }

        button {
            padding:18px;
            font-size:18px;
            border:none;
            border-radius:12px;
            background:#00c853;
            color:white;
            font-weight:bold;
        }

        button:active {
            transform:scale(0.98);
        }

        .label {
            font-size:13px;
            opacity:0.7;
        }

        /* NAVBAR MOBILE COMPATTA */

        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            padding: 6px;
            box-shadow: 0 -2px 10px #000;
        }

        .navbar button {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 8px 4px;
            font-size: 11px;
            border-radius: 8px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .navbar button:active {
            background: #333;
        }
    </style>
</head>

<body>

<h1>➕ Nuovo Ordine</h1>

<div class="container">

    <div>
        <div class="label">Cliente</div>
        <input id="cliente" placeholder="es. WALVOIL">
    </div>

    <div>
        <div class="label">Codice</div>
        <input id="codice" placeholder="es. 1ANE234">
    </div>

    <div>
        <div class="label">Commessa</div>
        <input id="commessa" placeholder="numero">
    </div>

    <div>
        <div class="label">Quantità</div>
        <input id="quantita" type="number">
    </div>

    <div>
        <div class="label">Tempo ciclo (sec)</div>
        <input id="tempo" type="number">
    </div>

    <div>
        <div class="label">Macchina</div>
        <select id="macchina">
            <option value="">-- seleziona --</option>
            <option value="1">T1</option>
            <option value="2">T2</option>
            <option value="3">T3</option>
        </select>
    </div>

    <button onclick="crea()">CREA ORDINE</button>

</div>

<script>

    function crea(){

        let ordine = {
            cliente: cliente.value,
            codiceParticolare: codice.value,
            numeroCommessa: commessa.value,
            quantita: parseInt(quantita.value),
            tempoCicloSec: parseInt(tempo.value),
            macchina: macchina.value ? { id: parseInt(macchina.value) } : null
        };

// VALIDAZIONE BASE
        if(!ordine.cliente || !ordine.codiceParticolare || !ordine.quantita){
            alert("Compila i campi obbligatori");
            return;
        }

        fetch('/ordini', {
            method:'POST',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify(ordine)
        })
            .then(()=>{
                alert("Ordine creato");
                location.reload();
            });

    }

    // UX: INVIO = CAMPO SUCCESSIVO
    document.querySelectorAll("input").forEach((el, i, arr)=>{
        el.addEventListener("keypress", function(e){
            if(e.key === "Enter"){
                e.preventDefault();
                if(arr[i+1]) arr[i+1].focus();
            }
        });
    });

</script>
<div class="navbar">
    <button onclick="location.href='/mobile.html'">HOME</button>
    <button onclick="location.href='/mobile-ordini.html'">CREA</button>
    <button onclick="location.href='/sospesi.html'">SOSPESI</button>
    <button onclick="location.href='/storico.html'">STORICO</button>
    <button onclick="location.href='/mobile-lista.html'">ORDINI</button>
</div>
</body>
</html>
