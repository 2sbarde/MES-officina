<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MES Inserimento Ordini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background:#111;
            color:white;
            font-family:Arial;
            margin:0;
            padding:10px;
        }

        h1 {
            text-align:center;
        }

        .topbar {
            position:sticky;
            top:0;
            background:#000;
            padding:10px;
            text-align:center;
        }

        input, select {
            width:100%;
            padding:16px;
            margin-top:10px;
            font-size:18px;
            border-radius:12px;
            border:none;
        }

        button {
            width:100%;
            padding:18px;
            margin-top:15px;
            font-size:20px;
            border:none;
            border-radius:12px;
            font-weight:bold;
        }

        .crea {
            background:#00c853;
        }

        .back {
            background:#2196F3;
        }

        .msg {
            text-align:center;
            padding:10px;
            margin:10px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h1>➕ Nuovo Ordine</h1>
</div>

<button class="back" onclick="tornaDashboard()">⬅ Dashboard</button>

<div id="messaggio"></div>

<input id="commessa" placeholder="Commessa">
<input id="codice" placeholder="Codice">
<input id="cliente" placeholder="Cliente">

<input id="materiale" placeholder="Materiale (es: Acciaio)">
<input id="diametro" placeholder="Diametro barra (es: 20)">

<input id="quantita" type="number" placeholder="Quantità">
<input id="tempo" type="number" placeholder="Tempo ciclo (sec)">

<select id="machineSelect"></select>

<button class="crea" onclick="crea()">🚀 CREA ORDINE</button>

<script>

    let machines = [];

    function vibra() {
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function messaggio(testo, ok=true) {
        document.getElementById("messaggio").innerHTML =
            `<div class="msg" style="background:${ok ? '#4CAF50' : '#f44336'}">${testo}</div>`;

        setTimeout(() => {
            document.getElementById("messaggio").innerHTML = "";
        }, 2000);
    }

    function caricaMacchine() {
        fetch('/machines')
            .then(r => r.json())
            .then(data => {

                machines = data;

                let select = document.getElementById("machineSelect");

                select.innerHTML = "";

                data.forEach(m => {
                    select.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    function crea() {

        let ordine = {
            numeroCommessa: document.getElementById("commessa").value,
            codiceParticolare: document.getElementById("codice").value,
            cliente: document.getElementById("cliente").value,
            materiale: document.getElementById("materiale").value,
            diametroBarra: document.getElementById("diametro").value,
            quantita: parseInt(document.getElementById("quantita").value),
            tempoCicloSec: parseInt(document.getElementById("tempo").value),
            macchina: { id: parseInt(document.getElementById("machineSelect").value) }
        };

        fetch('/ordini', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ordine)
        })
            .then(r => {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(() => {
                vibra();
                messaggio("Ordine creato ✔");

                // reset form
                document.querySelectorAll("input").forEach(i => i.value = "");
            })
            .catch(() => messaggio("Errore creazione ordine ❌", false));
    }

    caricaMacchine();
    function tornaDashboard() {
        window.location.href = "/mobile.html";
    }
</script>

</body>
</html>
