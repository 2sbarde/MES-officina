<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ordini</title>

    <style>
        body {
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            margin:10px;
        }

        input, select {
            width:100%;
            margin-top:5px;
            padding:10px;
            border-radius:6px;
            border:none;
        }

        button {
            margin-top:10px;
            padding:10px;
            border:none;
            border-radius:6px;
            color:white;
            font-weight:bold;
        }

        .btn-create { background:#2196f3; width:100%; }
        .btn-setup { background:orange; }
        .btn-start { background:#00c853; }

        .card { margin-top:20px; }
        h3 { border-bottom:1px solid #333; }

        .item {
            background:#222;
            margin-top:10px;
            padding:12px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<h2>📋 Ordini</h2>

<div class="card">

    <input id="commessa" placeholder="Commessa">
    <input id="codice" placeholder="Codice">
    <input id="cliente" placeholder="Cliente">
    <input id="materiale" placeholder="Materiale">
    <input id="diametro" placeholder="Ø">
    <input id="quantita" type="number" placeholder="Quantità">
    <input id="tempo" type="number" placeholder="Tempo ciclo (sec)">
    <input id="scadenza" type="date">

    <select id="machineSelect"></select>

    <button class="btn-create" onclick="crea()">➕ CREA ORDINE</button>

</div>

<hr>

<div id="lista">Caricamento...</div>

<script>

    // 🔥 FORMATTA DATA
    function formatData(dataString){
        if(!dataString) return "";
        let d = new Date(dataString);
        let giorno = String(d.getDate()).padStart(2,'0');
        let mese = String(d.getMonth()+1).padStart(2,'0');
        let anno = d.getFullYear();
        return `${giorno}/${mese}/${anno}`;
    }

    function caricaMacchine(){
        fetch('/macchine')
            .then(r=>r.json())
            .then(data=>{
                machineSelect.innerHTML="";
                data.forEach(m=>{
                    machineSelect.innerHTML+=`<option value="${m.id}">${m.nome}</option>`;
                });
            });
    }

    function crea(){

        let ordine = {
            numeroCommessa: commessa.value,
            codiceParticolare: codice.value,
            cliente: cliente.value,
            materiale: materiale.value,
            diametroBarra: diametro.value,
            quantita: parseInt(quantita.value),
            tempoCicloSec: parseInt(tempo.value),
            dataScadenza: scadenza.value,
            macchina:{id:parseInt(machineSelect.value)}
        };

        fetch('/ordini',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(ordine)
        }).then(()=>carica());
    }

    function setup(id){
        fetch(`/ordini/${id}/setup`,{method:'POST'})
            .then(()=>carica());
    }

    function start(id){
        fetch(`/ordini/${id}/start`,{method:'POST'})
            .then(()=>carica());
    }

    function carica(){
        fetch('/ordini')
            .then(r=>r.json())
            .then(data=>render(data));
    }

    function render(data){

        let gruppi={};

        let filtrati = data.filter(o=>o && o.stato!=="COMPLETATO");

        if(filtrati.length === 0){
            lista.innerHTML = "⚠️ Nessun ordine attivo";
            return;
        }

        filtrati.forEach(o=>{

            let nome = o.macchina?.nome || "NON ASSEGNATO";

            if(!gruppi[nome]) gruppi[nome]=[];
            gruppi[nome].push(o);
        });

        let html="";

        for(let macchina in gruppi){

            html+=`<div class="card"><h3>${macchina}</h3>`;

            gruppi[macchina]
                .sort((a,b)=>{
                    let da=a.dataScadenza?new Date(a.dataScadenza):new Date(9999999999999);
                    let db=b.dataScadenza?new Date(b.dataScadenza):new Date(9999999999999);
                    return da-db;
                })
                .forEach(o=>{

                    html+=`
<div class="item">
<div><b>${o.numeroCommessa||"-"}</b></div>
<div>${o.cliente||""}</div>
<div>${o.quantita||0} pezzi</div>
<div>${formatData(o.dataScadenza)}</div>
<div>Stato: ${o.stato}</div>

${o.stato==="CREATO" ? `<button class="btn-setup" onclick="setup(${o.id})">SETUP</button>` : ""}
${o.stato==="IN_SETUP" ? `<button class="btn-start" onclick="start(${o.id})">START</button>` : ""}

</div>`;
                });

            html+=`</div>`;
        }

        lista.innerHTML=html;
    }

    caricaMacchine();
    carica();

</script>

</body>
</html>
