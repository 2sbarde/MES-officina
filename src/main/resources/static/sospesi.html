<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sospesi</title>

    <style>
        body { background:#0f0f0f; color:white; font-family:Arial; margin:10px; }

        .ordine-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap:4px;
            padding:6px;
            font-size:12px;
            border-bottom:1px solid #333;
        }

        .tempo-input {
            width:55px;
            text-align:center;
        }

        .macchina-select {
            width:70px;
            text-align:center;
        }

        button {
            font-size:11px;
            border:none;
            color:white;
            border-radius:6px;
            padding:4px;
            cursor:pointer;
        }

        .btn-setup { background:#f59e0b; }
        .btn-start { background:#16a34a; }
        .btn-del { background:#dc2626; }
        .btn-riprendi { background:#16a34a; }

        .container-macchine {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap:8px;
        }

        .colonna {
            background:#1a1a1a;
            padding:5px;
            border-radius:10px;
        }

        h2 {
            text-align:center;
            font-size:14px;
        }

        .topnav {
            position: sticky;
            top: 0;
            background: #020617;
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid #1e293b;
        }

        .topnav a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="topnav">
    <a href="/index.html">🏭 Dashboard</a>
    <a href="/ordini.html">📋 Ordini</a>
    <a href="/sospesi.html">⏸ Sospesi</a>
    <a href="/storico.html">📊 Storico</a>
    <a href="/stats.html">📈 Statistiche</a>
</div>

<h1>⏸ Ordini Sospesi</h1>

<div id="lista"></div>

<script>

    function formatData(dataString){
        if(!dataString) return "";
        let d = new Date(dataString);
        return d.toLocaleDateString("it-IT");
    }

    function carica(){
        fetch('/ordini')
            .then(r=>r.json())
            .then(data=>render(data));
    }

    function render(data){

        let gruppi={};

        data.filter(o=>o.stato==="SOSPESO").forEach(o=>{
            let nome=o.macchina?o.macchina.nome:"NON ASSEGNATO";
            if(!gruppi[nome]) gruppi[nome]=[];
            gruppi[nome].push(o);
        });

        let html = `<div class="container-macchine">`;

        ["T1","T2","T3"].forEach(nomeMacchina => {

            html += `<div class="colonna"><h2>${nomeMacchina}</h2>`;

            (gruppi[nomeMacchina] || []).forEach(o=>{

                let perc = o.quantita>0 ? Math.round((o.pezziProdotti/o.quantita)*100) : 0;

                html+=`
<div class="ordine-row">

<div><b>${o.numeroCommessa||""}</b></div>
<div>📦 ${o.quantita}</div>

<div>${o.cliente||""}</div>
<div>⚙️</div>

<div>${o.codiceParticolare||""}</div>
<div>⏱ ${o.tempoCicloSec||0}</div>

<div>📅 ${formatData(o.dataScadenza)}</div>
<div>${o.macchina?.nome||""}</div>

<div>
<button class="btn-riprendi" onclick="riprendi(${o.id})">▶ RIPRENDI</button>
<button class="btn-del" onclick="elimina(${o.id})">❌</button>
</div>

<div><b>${o.stato}</b></div>

</div>`;
            });

            html += `</div>`;
        });

        html += `</div>`;

        document.getElementById("lista").innerHTML = html;
    }

    function elimina(id){
        if(!confirm("Eliminare?")) return;
        fetch(`/ordini/${id}/elimina`, {method:'POST'}).then(carica);
    }

    function riprendi(id){
        fetch(`/ordini/${id}/riprendi`, {method:'POST'})
            .then(()=>carica());
    }

    carica();

</script>

</body>
</html>
