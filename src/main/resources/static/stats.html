<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Statistiche</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            margin:10px;
        }

        .topnav {
            position: sticky;
            top: 0;
            background: #020617;
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid #1e293b;
        }

        .topnav a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .topnav a:hover {
            background: #1e293b;
        }

        .container {
            max-width:900px;
            margin:auto;
        }

        .macchina-grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap:12px;
        }

        .card {
            background:#1e293b;
            padding:16px;
            border-radius:12px;
        }

        .title {
            font-size:14px;
            opacity:0.7;
            margin-bottom:6px;
        }

        .mini-kpi {
            display:flex;
            justify-content:space-between;
            font-size:12px;
            margin-top:6px;
        }

        canvas {
            max-height:100px !important;
            margin-top:6px;
        }
    </style>
</head>

<body>

<div class="topnav">
    <a href="/index.html">🏭 Dashboard</a>
    <a href="/ordini.html">📋 Ordini</a>
    <a href="/sospesi.html">⏸ Sospesi</a>
    <a href="/storico.html">📊 Storico</a>
    <a href="/stats.html">📈 Statistiche</a>
</div>

<div class="container">
    <h1>📊 Statistiche produzione</h1>
    <div id="stats"></div>
</div>

<script>
    function caricaStats() {

        fetch('/ordini')
            .then(r => r.json())
            .then(data => {

                let macchine = {};
                let clientiPerMacchina = {};

                // ===== LOOP DATI =====
                data.forEach(o => {
                    if (!o.macchina) return;

                    let nome = o.macchina.nome;
                    let cliente = (o.cliente || "N/D")
                        .toUpperCase()
                        .trim()
                        .replace(/\s+/g, ' ');

                    if (!macchine[nome]) {
                        macchine[nome] = {
                            pezzi: 0,
                            tempoTot: 0,
                            count: 0,
                            ordini: 0
                        };
                    }

                    macchine[nome].pezzi += o.pezziProdotti || 0;

                    if (o.tempoCicloSec) {
                        macchine[nome].tempoTot += o.tempoCicloSec * (o.pezziProdotti || 1);
                        macchine[nome].count++;
                    }

                    macchine[nome].ordini++;

                    // CLIENTI
                    if (!clientiPerMacchina[nome]) {
                        clientiPerMacchina[nome] = {};
                    }

                    if (!clientiPerMacchina[nome][cliente]) {
                        clientiPerMacchina[nome][cliente] = 0;
                    }

                    clientiPerMacchina[nome][cliente] += o.pezziProdotti || 0;
                });

                // ===== HTML =====
                let html = `<div class="macchina-grid">`;

                Object.entries(macchine).forEach(([nome, m], index) => {

                    let tempoMedio = m.pezzi > 0 ? Math.round(m.tempoTot / m.pezzi) : 0;
                    let ore = Math.round(m.tempoTot / 3600);

                    html += `
                <div class="card">

                    <div class="title">${nome}</div>

                    <canvas id="gauge${index}"></canvas>
                    <canvas id="pie${index}"></canvas>

                    <div class="mini-kpi">
                        <span>📦 Pezzi: <b>${m.pezzi}</b></span>
                        <span>⚙️ Ordini: <b>${m.ordini}</b></span>
                    </div>

                    <div class="mini-kpi">
                        <span>⏱ Tc medio: <b>${tempoMedio}s</b></span>
                        <span>🕒 Ore: <b>${ore}h</b></span>
                    </div>

                </div>
                `;
                });

                html += `</div>`;

                document.getElementById("stats").innerHTML = html;

                // ===== GRAFICI =====
                Object.entries(macchine).forEach(([nome, m], index) => {

                    let efficienza = Math.min(
                        100,
                        Math.round((m.pezzi / (m.ordini * 50)) * 100)
                    );

                    // GAUGE
                    new Chart(document.getElementById(`gauge${index}`), {
                        type: 'doughnut',
                        data: {
                            datasets: [{
                                data: [efficienza, 100 - efficienza]
                            }]
                        },
                        options: {
                            circumference: 180,
                            rotation: 270,
                            cutout: '75%',
                            plugins: { legend: { display: false } }
                        }
                    });

                    // PIE CLIENTI
                    let clienti = clientiPerMacchina[nome] || {};

                    let entries = Object.entries(clienti)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 5);

                    let labels = entries.map(e => e[0]);
                    let values = entries.map(e => e[1]);

                    new Chart(document.getElementById(`pie${index}`), {
                        type: 'pie',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: values
                            }]
                        },
                        options: {
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        color: 'white',
                                        font: { size: 10 }
                                    }
                                }
                            }
                        }
                    });

                });

            });
    }

    caricaStats();
</script>

</body>
</html>
