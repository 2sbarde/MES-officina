<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Statistiche</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <style>
        body {
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            margin:10px;
        }

        .topnav {
            position: sticky;
            top: 0;
            background: #020617;
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid #1e293b;
        }

        .topnav a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .topnav a:hover {
            background: #1e293b;
        }

        .container {
            max-width:1000px;
            margin:auto;
        }

        .macchina-grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap:16px;
        }

        .card {
            background:#1e293b;
            padding:16px;
            border-radius:12px;
        }

        .title {
            font-size:16px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .mini-kpi {
            display:flex;
            justify-content:space-between;
            font-size:13px;
            margin-top:6px;
        }

        canvas {
            max-height:200px !important;
        }
    </style>
</head>

<body>

<div class="topnav">
    <a href="/index.html">🏭 Dashboard</a>
    <a href="/ordini.html">📋 Ordini</a>
    <a href="/sospesi.html">⏸ Sospesi</a>
    <a href="/storico.html">📊 Storico</a>
    <a href="/stats.html">📈 Statistiche</a>
</div>

<div class="container">
    <h1>📊 Statistiche produzione</h1>
    <div id="stats"></div>
</div>

<script>

    function generaColori(n) {
        let colori = [];
        for (let i = 0; i < n; i++) {
            let hue = Math.floor((i * 360) / n);
            colori.push(`hsl(${hue}, 70%, 55%)`);
        }
        return colori;
    }

    function caricaStats() {

        fetch('/ordini/storico')
            .then(r => r.json())
            .then(data => {

                let macchine = {};
                let clientiPerMacchina = {};

                // ===== LOOP DATI =====
                data.forEach(o => {

                    let nome = o.macchina.nome;
                    let cliente = (o.cliente || "N/D")
                        .toUpperCase()
                        .trim()
                        .replace(/\s+/g, ' ');

                    if (!macchine[nome]) {
                        macchine[nome] = {
                            pezzi: 0,
                            tempoTot: 0,
                            ordini: 0
                        };
                    }

                    macchine[nome].pezzi += o.pezziProdotti || 0;

                    if (o.tempoCicloSec) {
                        macchine[nome].tempoTot += o.tempoCicloSec * (o.pezziProdotti || 1);
                    }

                    macchine[nome].ordini++;

                    if (!clientiPerMacchina[nome]) {
                        clientiPerMacchina[nome] = {};
                    }

                    if (!clientiPerMacchina[nome][cliente]) {
                        clientiPerMacchina[nome][cliente] = 0;
                    }

                    clientiPerMacchina[nome][cliente] += o.pezziProdotti || 0;
                });

                // ===== HTML =====
                let html = `<div class="macchina-grid">`;

                Object.entries(macchine)
                    .sort((a, b) => {
                        const ordine = ["T1", "T2", "T3"];
                        return ordine.indexOf(a[0]) - ordine.indexOf(b[0]);
                    })
                    .forEach(([nome, m], index) => {

                    let tempoMedio = m.pezzi > 0 ? Math.round(m.tempoTot / m.pezzi) : 0;
                    let ore = Math.round(m.tempoTot / 3600);

                    html += `
                <div class="card">

                    <div class="title">${nome}</div>

                    <canvas id="pie${index}"></canvas>

                    <div class="mini-kpi">
                        <span>📦 Pezzi: <b>${m.pezzi}</b></span>
                        <span>⚙️ Ordini: <b>${m.ordini}</b></span>
                    </div>

                    <div class="mini-kpi">
                        <span>⏱ Tc medio: <b>${tempoMedio}s</b></span>
                        <span>🕒 Ore: <b>${ore}h</b></span>
                    </div>

                </div>
                `;
                });

                html += `</div>`;
                document.getElementById("stats").innerHTML = html;

                // ===== PIE CHART =====
                Object.entries(macchine)
                    .sort((a, b) => {
                        const ordine = ["T1", "T2", "T3"];
                        return ordine.indexOf(a[0]) - ordine.indexOf(b[0]);
                    })
                    .forEach(([nome, m], index) => {

                    let clienti = clientiPerMacchina[nome] || {};

                    let entries = Object.entries(clienti)
                        .sort((a, b) => b[1] - a[1]);

                    let top = entries.slice(0, 4);
                    let altri = entries.slice(4).reduce((sum, e) => sum + e[1], 0);

                    let labels = top.map(e => e[0]);
                    let values = top.map(e => e[1]);

                    if (altri > 0) {
                        labels.push("ALTRI");
                        values.push(altri);
                    }

                    new Chart(document.getElementById(`pie${index}`), {
                        type: 'pie',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: values,
                                backgroundColor: generaColori(values.length)
                            }]
                        },
                        options: {
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        color: 'white',
                                        font: { size: 11 }
                                    }
                                },
                                datalabels: {
                                    color: '#fff',
                                    font: { weight: 'bold', size: 11 },
                                    formatter: (value, context) => {
                                        let total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        let perc = (value / total * 100);
                                        if (perc < 5) return ""; // evita casino
                                        return perc.toFixed(1) + "%";
                                    }
                                }
                            }
                        },
                        plugins: [ChartDataLabels]
                    });

                });

            });
    }

    caricaStats();

</script>

</body>
</html>
