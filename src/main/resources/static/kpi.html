<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>KPI</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        .box {
            background:#222;
            margin:10px;
            padding:15px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<a href="/" style="color:white;">🏭 Dashboard</a>

<h1>📊 KPI PRODUZIONE</h1>

<div id="kpi"></div>

<script>

    function carica(){

        fetch('/ordini/kpi')
            .then(r=>r.json())
            .then(data=>{

                kpi.innerHTML="";

                data.forEach(m=>{

                    kpi.innerHTML+=`
<div class="box">

<b>Macchina ${m.macchina}</b><br>
Pezzi prodotti: ${m.pezzi}<br>
Ordini: ${m.ordini}<br>
Tempo lavorato: ${m.tempo}s<br>
Media pezzi/ordine: ${m.media}

</div>
`;

                });

            });
    }

    carica();

</script>

</body>
</html>
