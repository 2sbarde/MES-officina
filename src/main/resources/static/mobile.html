<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MES Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a, #111);
            color:white;
            font-family:Arial;
            margin:0;
            padding:10px;
            padding-bottom:80px;
        }

        /* HEADER */
        .topbar {
            position:sticky;
            top:0;
            background:#000;
            padding:12px;
            text-align:center;
            font-size:18px;
            font-weight:bold;
        }

        /* CARD */
        .card {
            border-radius:16px;
            padding:16px;
            margin:12px 0;
            box-shadow:0 0 10px #000;
        }

        /* STATI */
        .CREATO { background:#444; }
        .IN_SETUP { background:#ff9800; }
        .IN_PRODUZIONE { background:#00c853; }
        .FERMA { background:#c62828; }

        /* TESTI */
        .titolo {
            font-size:18px;
            font-weight:bold;
            margin-bottom:6px;
        }

        .sub {
            font-size:13px;
            opacity:0.8;
            margin-bottom:6px;
        }

        /* PROGRESS */
        .progress {
            background:#222;
            border-radius:8px;
            overflow:hidden;
            height:14px;
            margin-top:6px;
        }

        .progress-bar {
            height:100%;
        }

        /* BOTTONI */
        button {
            width:100%;
            padding:14px;
            margin-top:8px;
            font-size:16px;
            border:none;
            border-radius:10px;
            font-weight:bold;
        }

        .btn-setup { background:#ff9800; }
        .btn-start { background:#00c853; }
        .btn-versa { background:#2196f3; }
        .btn-chiudi { background:#c62828; }

        /* INPUT */
        input {
            width:100%;
            padding:12px;
            margin-top:8px;
            border-radius:10px;
            border:none;
        }

        /* CODA */
        .coda-title {
            margin-top:10px;
            font-size:14px;
            font-weight:bold;
        }

        .coda-item {
            margin-top:6px;
            padding:10px;
            background:#222;
            border-radius:10px;
            font-size:14px;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
    </style>
</head>

<body>

<div class="topbar">
    🏭 MES
    <button onclick="carica()">🔄</button>
</div>

<div id="macchine"></div>

<script>
    function tempoRestante(ordine){
        if(!ordine || !ordine.quantita || !ordine.tempoCicloSec) return "";

        let mancanti = ordine.quantita - (ordine.pezziProdotti || 0);

        if(mancanti <= 0) return "0m";

        let secondi = mancanti * ordine.tempoCicloSec;

        let ore = Math.floor(secondi / 3600);
        let minuti = Math.floor((secondi % 3600) / 60);

        if(ore > 0){
            return `${ore}h ${minuti}m`;
        } else {
            return `${minuti}m`;
        }
    }
    function nomeMacchina(nome){
        if(nome === "T1") return "T1 STAR32";
        if(nome === "T2") return "T2 MURATEC MT12";
        if(nome === "T3") return "T3 BIGLIA 446T2Y2";
        return nome;
    }

    function formatStato(stato){
        return stato ? stato.replaceAll("_"," ") : "";
    }
    function carica() {
        fetch('/ordini/dashboard')
            .then(r => r.json())
            .then(data => {

                let html = "";

                data.forEach(m => {

                    let ordine = m.attivo;

                    html += `<div class="card ${formatStato(m.stato)}">`;
                    html += `<div class="titolo">${nomeMacchina(m.macchina)}</div>`;
                    html += `<div class="sub">Stato: ${formatStato(ordine.stato)}</div>`;

                    if (ordine) {

                        let percentuale = 0;
                        if(ordine.quantita > 0){
                            percentuale = Math.min(100, Math.round((ordine.pezziProdotti / ordine.quantita) * 100));
                        }

                        let barColor = "#00c853";
                        if(percentuale < 30) barColor = "red";
                        else if(percentuale < 70) barColor = "orange";

                        html += `
<hr>

<div><b>${ordine.cliente || "-"}</b></div>
<div class="sub">${ordine.numeroCommessa || "-"} • ${ordine.codiceParticolare || "-"}</div>

<div>${ordine.pezziProdotti || 0}/${ordine.quantita || 0}</div>

<div class="progress">
<div class="progress-bar" style="width:${percentuale}%; background:${barColor};"></div>
</div>

<div class="sub" style="text-align:right">${percentuale}%</div>
<div class="sub">⏱ Restano: ${tempoRestante(ordine)}</div>
`;

                        html += `<input type="number" id="p-${ordine.id}" placeholder="pezzi prodotti">`;

                        html += `
<button class="btn-setup" onclick="setup(${ordine.id})" ${ordine.stato !== "CREATO" ? "disabled":""}>SETUP</button>
<button class="btn-start" onclick="start(${ordine.id})" ${ordine.stato !== "IN_SETUP" ? "disabled":""}>START</button>
<button class="btn-versa" onclick="versa(${ordine.id})" ${ordine.stato !== "IN_PRODUZIONE" ? "disabled":""}>VERSA</button>
<button class="btn-chiudi" onclick="chiudi(${ordine.id})">CHIUDI</button>
`;

                    } else {
                        html += `<hr><div>Macchina ferma</div>`;
                    }

// CODA
                    if (m.coda && m.coda.length > 0) {

                        html += `<div class="coda-title">📋 Coda</div>`;

                        m.coda.forEach(c => {
                            html += `
<div class="coda-item" onclick="priorita(${c.id})">
${c.numeroCommessa || "-"}<br>
${c.cliente || "-"}
</div>
`;
                        });
                    }

                    html += `</div>`;
                });

                document.getElementById("macchine").innerHTML = html;
            });
    }

    // AZIONI
    function setup(id){ fetch(`/ordini/${id}/setup`,{method:'POST'}).then(carica); }
    function start(id){ fetch(`/ordini/${id}/start`,{method:'POST'}).then(carica); }

    function versa(id){
        let v = document.getElementById("p-"+id).value;

        if(!v || v <= 0){
            alert("Inserisci numero valido");
            return;
        }

        fetch(`/ordini/${id}/versa?pezzi=${parseInt(v)}`,{method:'POST'}).then(carica);
    }

    function chiudi(id){
        if(!confirm("Chiudere ordine?")) return;
        fetch(`/ordini/${id}/chiudi`,{method:'POST'}).then(carica);
    }

    function priorita(id){
        fetch(`/ordini/${id}/priorita`, {method:'POST'})
            .then(()=> carica());
    }

    // NAV
    function goDash(){ window.location.href="/mobile.html"; }
    function goOrdini(){ window.location.href="/mobile-ordini.html"; }
    function goStorico(){ window.location.href="/storico.html"; }

    carica();

</script>

<div class="navbar">
    <button onclick="goDash()">🏠</button>
    <button onclick="goOrdini()">➕</button>
    <button onclick="goStorico()">📊</button>
</div>

</body>
</html>
