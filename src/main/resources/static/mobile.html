<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MES Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a, #111);
            color:white;
            font-family:Arial;
            margin:0;
            padding:10px;
            padding-bottom:80px; /* 🔥 FIX */
        }

        h1 { text-align:center; }

        .topbar {
            position:sticky;
            top:0;
            background:#000;
            padding:10px;
            text-align:center;
        }

        .card {
            border-radius:20px;
            padding:18px;
            margin:12px 0;
        }

        .CREATO { background:#444; }
        .IN_SETUP { background:orange; }
        .IN_PRODUZIONE { background:green; }
        .FERMA { background:red; }

        button {
            width:100%;
            padding:16px;
            margin-top:10px;
            font-size:18px;
            border:none;
            border-radius:12px;
        }

        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h1>🏭 MES</h1>
    <button onclick="carica()">🔄 AGGIORNA</button>
</div>

<div id="macchine"></div>

<script>

    function carica() {
        fetch('/ordini/dashboard')
            .then(r => r.json())
            .then(data => {

                let html = "";

                data.forEach(m => {

                    let ordine = m.attivo;

                    html += `<div class="card ${m.stato}">`;

                    html += `<b>${m.macchina}</b><br>`;
                    html += `Stato: ${m.stato}<br>`;

                    if (ordine) {
                        html += `
                    ${ordine.numeroCommessa}<br>
                    ${ordine.codiceParticolare}<br>
                    ${ordine.pezziProdotti}/${ordine.quantita}
                    `;
                    }

                    html += `</div>`;
                });

                document.getElementById("macchine").innerHTML = html;
            });
    }

    function goDash() { window.location.href="/mobile.html"; }
    function goOrdini() { window.location.href="/mobile-ordini.html"; }
    function goStorico() { window.location.href="/storico.html"; }

    carica();

</script>

<div class="navbar">
    <button onclick="goDash()">🏠</button>
    <button onclick="goOrdini()">➕</button>
    <button onclick="goStorico()">📊</button>
</div>

</body>
</html>
