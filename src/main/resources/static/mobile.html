<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MES Mobile</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background:#111;
            color:white;
            font-family:Arial;
            margin:0;
            padding:10px;
        }

        h1 { text-align:center; }

        .topbar {
            position:sticky;
            top:0;
            background:#000;
            padding:10px;
            text-align:center;
        }

        .card {
            border-radius:15px;
            padding:15px;
            margin:10px 0;
            transition:0.2s;
        }

        .CREATO { background:#555; }
        .IN_SETUP { background:orange; }
        .IN_PRODUZIONE { background:green; }

        /* 🔥 NUOVI */
        .SETUP { background:orange; }
        .PRODUZIONE { background:green; }

        .FERMA { background:red; }

        button {
            width:100%;
            padding:15px;
            margin-top:10px;
            font-size:18px;
            border:none;
            border-radius:10px;
        }

        button:disabled {
            opacity:0.4;
        }

        .refresh { background:#2196F3; }

        .ok { background:#4CAF50; }
        .err { background:#f44336; }

        input {
            width:100%;
            padding:12px;
            margin-top:10px;
            font-size:18px;
            border-radius:10px;
            border:none;
        }

        .msg {
            text-align:center;
            padding:10px;
            margin:10px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h1>🏭 MES</h1>
    <button class="refresh" onclick="carica()">🔄 AGGIORNA</button>
</div>

<div id="messaggio"></div>
<div id="macchine"></div>

<script>

    function vibra() {
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function messaggio(testo, tipo="ok") {
        document.getElementById("messaggio").innerHTML =
            `<div class="msg ${tipo}">${testo}</div>`;

        setTimeout(() => {
            document.getElementById("messaggio").innerHTML = "";
        }, 2000);
    }

    function carica() {
        fetch('/ordini/dashboard')
            .then(r => r.json())
            .then(data => {

                let html = "";

                data.forEach(m => {

                    let ordine = m.attivo;

                    html += `<div class="card ${m.stato}">`;

                    html += `<b>${m.macchina}</b><br>`;
                    html += `Stato: ${m.stato}<br>`;

                    if (ordine) {

                        html += `
                        <br>
                        ${ordine.numeroCommessa}<br>
                        ${ordine.codiceParticolare}<br>
                        ${ordine.pezziProdotti}/${ordine.quantita}
                    `;

                        html += `
                        <input type="number" id="p-${ordine.id}" placeholder="pezzi">
                    `;

                        html += `
                        <button onclick="setup(${ordine.id})"
                            ${ordine.stato !== "CREATO" ? "disabled" : ""}>
                            SETUP
                        </button>

                        <button onclick="start(${ordine.id})"
                            ${ordine.stato !== "SETUP" && ordine.stato !== "IN_SETUP" ? "disabled" : ""}>
                            START
                        </button>

                        <button onclick="versa(${ordine.id})"
                            ${ordine.stato !== "PRODUZIONE" && ordine.stato !== "IN_PRODUZIONE" ? "disabled" : ""}>
                            VERSA
                        </button>

                        <button onclick="chiudi(${ordine.id})">
                            CHIUDI
                        </button>
                    `;
                    } else {
                        html += "<br>Macchina ferma";
                    }

                    html += `</div>`;
                });

                document.getElementById("macchine").innerHTML = html;
            });
    }

    function setup(id) {
        fetch(`/ordini/${id}/setup`, {method:'POST'})
            .then(() => { vibra(); messaggio("Setup eseguito"); carica(); })
            .catch(() => messaggio("Errore setup", "err"));
    }

    function start(id) {
        fetch(`/ordini/${id}/start`, {method:'POST'})
            .then(() => { vibra(); messaggio("Produzione avviata"); carica(); })
            .catch(() => messaggio("Errore start", "err"));
    }

    function versa(id) {
        let v = document.getElementById("p-" + id).value;

        fetch(`/ordini/${id}/versa?pezzi=${v}`, {method:'POST'})
            .then(() => { vibra(); messaggio("Pezzi aggiornati"); carica(); })
            .catch(() => messaggio("Errore versamento", "err"));
    }

    function chiudi(id) {
        fetch(`/ordini/${id}/chiudi`, {method:'POST'})
            .then(() => { vibra(); messaggio("Ordine chiuso"); carica(); })
            .catch(() => messaggio("Errore chiusura", "err"));
    }

    carica();

</script>

</body>
</html>
