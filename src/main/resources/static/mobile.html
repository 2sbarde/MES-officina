<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MES Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a, #111);
            color:white;
            font-family:Arial;
            margin:0;
            padding:10px;
            padding-bottom:80px;
        }

        .topbar {
            position:sticky;
            top:0;
            background:#000;
            padding:10px;
            text-align:center;
        }

        .card {
            border-radius:20px;
            padding:18px;
            margin:12px 0;
        }

        .CREATO { background:#444; }
        .IN_SETUP { background:orange; }
        .IN_PRODUZIONE { background:green; }
        .FERMA { background:red; }

        button {
            width:100%;
            padding:16px;
            margin-top:10px;
            font-size:18px;
            border:none;
            border-radius:12px;
        }

        .coda-item {
            margin-top:5px;
            padding:8px;
            background:#222;
            border-radius:8px;
            font-size:14px;
        }

        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h1>🏭 MES</h1>
    <button onclick="carica()">🔄 AGGIORNA</button>
</div>

<div id="macchine"></div>

<script>

    function carica() {
        fetch('/ordini/dashboard')
            .then(r => r.json())
            .then(data => {

                let html = "";

                data.forEach(m => {

                    let ordine = m.attivo;

                    html += `<div class="card ${m.stato}">`;
                    html += `<b>${m.macchina}</b><br>`;
                    html += `Stato: ${m.stato}<br>`;

                    /* 🔥 ORDINE ATTIVO */
                    if (ordine) {

                        html += `
                        <br>
                        <div>Commessa: ${ordine.numeroCommessa || "-"}</div>
                        <div>Cliente: ${ordine.cliente || "-"}</div>
                        <div>Codice: ${ordine.codiceParticolare || "-"}</div>
                        <div>Pezzi: ${ordine.pezziProdotti || 0}/${ordine.quantita || 0}</div>

${ordine.tempoRealeSec ? `
<div style="margin-top:8px; font-size:12px; opacity:0.85; background:#00000055; padding:8px; border-radius:10px;">
⏱ Tempo: ${ordine.tempoRealeSec}s<br>
⚙️ Teorici: ${ordine.pezziTeorici || 0}<br>
${ordine.tempoRealeSec ? `
<div style="margin-top:8px; font-size:12px; background:#00000055; padding:8px; border-radius:10px;">
⏱ Tempo: ${ordine.tempoRealeSec}s<br>
⚙️ Teorici: ${ordine.pezziTeorici || 0}<br>

📊 Efficienza:
<span style="
    font-weight:bold;
    color:
    ${ordine.efficienza > 80 ? 'lime' :
                            ordine.efficienza > 50 ? 'orange' :
                                'red'};
">
${ordine.efficienza || 0}%
</span>

</div>
` : ""}
</div>
` : ""}
                    `;

                        html += `<input type="number" id="p-${ordine.id}" placeholder="pezzi">`;

                        html += `
                        <button onclick="setup(${ordine.id})" ${ordine.stato !== "CREATO" ? "disabled" : ""}>SETUP</button>
                        <button onclick="start(${ordine.id})" ${ordine.stato !== "IN_SETUP" ? "disabled" : ""}>START</button>
                        <button onclick="versa(${ordine.id})" ${ordine.stato !== "IN_PRODUZIONE" ? "disabled" : ""}>VERSA</button>
                        <button onclick="chiudi(${ordine.id})">CHIUDI</button>
                    `;
                    } else {
                        html += `<br><div>Macchina ferma</div>`;
                    }

                    /* 🔥 CODA ORDINI */
                    if (m.coda && m.coda.length > 0) {

                        html += `<hr><b>📋 Coda ordini:</b>`;

                        m.coda.forEach(c => {
                            html += `
    <div class="coda-item" onclick="priorita(${c.id})">
        ${c.numeroCommessa || "-"} - ${c.cliente || "-"}<br>
        Stato: ${c.stato}
    </div>
    `;
                        });
                    }

                    html += `</div>`;
                });

                document.getElementById("macchine").innerHTML = html;
            });
    }

    // AZIONI
    function setup(id){ fetch(`/ordini/${id}/setup`,{method:'POST'}).then(carica); }
    function start(id){ fetch(`/ordini/${id}/start`,{method:'POST'}).then(carica); }
    function versa(id){
        let v = document.getElementById("p-"+id).value;
        fetch(`/ordini/${id}/versa?pezzi=${v}`,{method:'POST'}).then(carica);
    }
    function chiudi(id){ fetch(`/ordini/${id}/chiudi`,{method:'POST'}).then(carica); }

    // NAVBAR
    function goDash(){ window.location.href="/mobile.html"; }
    function goOrdini(){ window.location.href="/mobile-ordini.html"; }
    function goStorico(){ window.location.href="/storico.html"; }

    carica();

    if (!ordine.id) {
        // macchina ferma
    }
    function priorita(id){
        fetch(`/ordini/${id}/priorita`, {method:'POST'})
            .then(()=> carica());
    }
</script>

<div class="navbar">
    <button onclick="goDash()">🏠</button>
    <button onclick="goOrdini()">➕</button>
    <button onclick="goStorico()">📊</button>
</div>

</body>
</html>
