<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MES Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a, #111);
            color:white;
            font-family:Arial;
            margin:0;
            padding:10px;
        }

        h1 {
            text-align:center;
            letter-spacing:2px;
        }

        .topbar {
            position:sticky;
            top:0;
            background:#000;
            padding:10px;
            text-align:center;
            box-shadow:0 0 10px #000;
        }

        .card {
            border-radius:20px;
            padding:18px;
            margin:12px 0;
            box-shadow:0 0 10px rgba(0,0,0,0.6);
            transition:0.3s;
        }

        .card:hover {
            transform:scale(1.02);
        }

        /* 🔥 STATI MIGLIORATI */
        .CREATO {
            background:#444;
        }

        .IN_SETUP {
            background:linear-gradient(45deg, orange, #ff9800);
            box-shadow:0 0 15px orange;
        }

        .IN_PRODUZIONE {
            background:linear-gradient(45deg, #00c853, #4caf50);
            box-shadow:0 0 15px #00ff88;
        }

        .FERMA {
            background:linear-gradient(45deg, #d50000, #ff1744);
            box-shadow:0 0 15px red;
        }

        button {
            width:100%;
            padding:16px;
            margin-top:10px;
            font-size:18px;
            border:none;
            border-radius:12px;
            font-weight:bold;
            letter-spacing:1px;
        }

        button:active {
            transform:scale(0.97);
        }

        button:disabled {
            opacity:0.3;
        }

        .refresh {
            background:#2196F3;
        }

        .ok { background:#4CAF50; }
        .err { background:#f44336; }

        input {
            width:100%;
            padding:14px;
            margin-top:10px;
            font-size:18px;
            border-radius:12px;
            border:none;
        }

        .msg {
            text-align:center;
            padding:12px;
            margin:10px;
            border-radius:12px;
            font-weight:bold;
        }

        .title {
            font-size:22px;
            font-weight:bold;
        }

        .info {
            font-size:16px;
            opacity:0.9;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h1>🏭 MES</h1>

    <button class="refresh" onclick="carica()">🔄 AGGIORNA</button>

    <button onclick="vaiOrdini()" style="background:#00c853; margin-top:10px;">
        ➕ NUOVO ORDINE
    </button>
</div>

<div id="messaggio"></div>
<div id="macchine"></div>

<script>

    function vibra() {
        if (navigator.vibrate) navigator.vibrate(80);
    }

    function messaggio(testo, tipo="ok") {
        document.getElementById("messaggio").innerHTML =
            `<div class="msg ${tipo}">${testo}</div>`;

        setTimeout(() => {
            document.getElementById("messaggio").innerHTML = "";
        }, 2000);
    }

    function carica() {
        fetch('/ordini/dashboard')
            .then(r => r.json())
            .then(data => {

                let html = "";

                data.forEach(m => {

                    let ordine = m.attivo;

                    html += `<div class="card ${m.stato}">`;

                    html += `<div class="title">${m.macchina}</div>`;
                    html += `<div class="info">STATO: ${m.stato}</div>`;

                    if (ordine) {

                        html += `
                        <br>
                        <div class="info">Commessa: ${ordine.numeroCommessa}</div>
                        <div class="info">Codice: ${ordine.codiceParticolare}</div>
                        <div class="info">Pezzi: ${ordine.pezziProdotti}/${ordine.quantita}</div>
                    `;

                        html += `
                        <input type="number" id="p-${ordine.id}" placeholder="pezzi totali">
                    `;

                        html += `
                        <button onclick="setup(${ordine.id})"
                            ${ordine.stato !== "CREATO" ? "disabled" : ""}>
                            ⚙️ SETUP
                        </button>

                        <button onclick="start(${ordine.id})"
                            ${ordine.stato !== "IN_SETUP" ? "disabled" : ""}>
                            ▶️ START
                        </button>

                        <button onclick="versa(${ordine.id})"
                            ${ordine.stato !== "IN_PRODUZIONE" ? "disabled" : ""}>
                            📦 VERSA
                        </button>

                        <button onclick="chiudi(${ordine.id})">
                            ✅ CHIUDI
                        </button>
                    `;
                    } else {
                        html += "<br><div class='info'>Macchina ferma</div>";
                    }

                    html += `</div>`;
                });

                document.getElementById("macchine").innerHTML = html;
            });
    }

    // AZIONI

    function setup(id) {
        fetch(`/ordini/${id}/setup`, {method:'POST'})
            .then(() => { vibra(); messaggio("Setup eseguito"); carica(); })
            .catch(() => messaggio("Errore setup", "err"));
    }

    function start(id) {
        fetch(`/ordini/${id}/start`, {method:'POST'})
            .then(() => { vibra(); messaggio("Produzione avviata"); carica(); })
            .catch(() => messaggio("Errore start", "err"));
    }

    function versa(id) {
        let v = document.getElementById("p-" + id).value;

        fetch(`/ordini/${id}/versa?pezzi=${v}`, {method:'POST'})
            .then(() => { vibra(); messaggio("Pezzi aggiornati"); carica(); })
            .catch(() => messaggio("Errore versamento", "err"));
    }

    function chiudi(id) {
        fetch(`/ordini/${id}/chiudi`, {method:'POST'})
            .then(() => { vibra(); messaggio("Ordine chiuso"); carica(); })
            .catch(() => messaggio("Errore chiusura", "err"));
    }

    carica();
    function vaiOrdini() {
        window.location.href = "/mobile-ordini.html";
    }
</script>

</body>
</html>
