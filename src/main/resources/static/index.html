<!DOCTYPE html>
<html>
<head>
    <script>
        if (/Mobi|Android/i.test(navigator.userAgent)) {
            window.location.href = "/mobile.html";
        }
    </script>
    <meta charset="UTF-8">
    <title>MES Dashboard</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        .macchina {
            margin:10px;
            padding:15px;
            border-radius:10px;
        }

        .FERMA { background:red; }
        .IN_SETUP { background:orange; }
        .IN_PRODUZIONE { background:green; }

        .barra {
            height:20px;
            background:#444;
            border-radius:10px;
            margin-top:10px;
        }

        .progresso {
            height:20px;
            background:lime;
            border-radius:10px;
        }

        .nav { margin-bottom:20px; }

        button { margin:5px; padding:5px; }
        input { margin:5px; padding:5px; }
    </style>
</head>

<body>

<div class="nav">
    <a href="/ordini.html">📋 Ordini</a> |
    <a href="/storico.html">📊 Storico</a> |
    <a href="/pianificazione.html">🗓 Pianificazione</a> |
    <a href="/kpi.html">📊 KPI</a>
</div>

<h1>🏭 MES INDUSTRIALE</h1>

<div id="macchine"></div>

<script>

    function carica() {

        fetch('/ordini/dashboard')
            .then(r=>r.json())
            .then(data=>{

                macchine.innerHTML="";

                data.forEach(m=>{

                    let o = m.attivo;

                    let html = `
            <div class="macchina ${m.stato}">
                <b>Macchina ${m.macchina}</b><br>
                Stato: ${m.stato}<br>
            `;

                    if(o){

                        html += `
                Cliente: ${o.cliente}<br>
                Commessa: ${o.numeroCommessa}<br>
                Prodotti: ${o.pezziProdotti}/${o.quantita}<br>
                Avanzamento: ${m.percentuale}%<br>
                Tempo residuo: ${m.tempoResiduo}s

                <div class="barra">
                    <div class="progresso" style="width:${m.percentuale}%"></div>
                </div>

                <br>

                <button onclick="setup(${o.id})">SETUP</button>
                <button onclick="start(${o.id})">START</button>

                <input type="number" id="pezzi-${o.id}" placeholder="pezzi">

                <button onclick="versa(${o.id})">VERSA</button>
                <button onclick="chiudi(${o.id})">CHIUDI</button>
                `;
                    }

                    html += `</div>`;

                    macchine.innerHTML += html;
                });

            });
    }

    function setup(id){ fetch(`/ordini/${id}/setup`, {method:'POST'}).then(carica); }
    function start(id){ fetch(`/ordini/${id}/start`, {method:'POST'}).then(carica); }
    function versa(id){
        let v=document.getElementById("pezzi-"+id).value;
        fetch(`/ordini/${id}/versa?pezzi=${v}`, {method:'POST'}).then(carica);
    }
    function chiudi(id){ fetch(`/ordini/${id}/chiudi`, {method:'POST'}).then(carica); }

    carica();

</script>

</body>
</html>
