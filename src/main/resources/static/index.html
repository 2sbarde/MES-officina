<!DOCTYPE html>
<html lang="it">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        body { background:#0f0f0f; color:white; font-family:Arial, sans-serif; margin:0; padding:10px; }

        h1 {
            text-align: center;
            margin: 20px 0 10px 0;
            font-size: 32px;
            font-weight: bold;
        }

        #macchine {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap:15px;
        }

        .macchina {
            padding:14px;
            border-radius:12px;
            box-shadow:0 0 8px #000;
            background:#1e293b;
            transition: all 0.25s ease;
        }

        .info-ordine {
            margin-top: 6px;
            font-size: 13px;
            line-height: 1.4;
        }

        .produzione {
            margin-top: 4px;
            font-size: 15px;
            font-weight: bold;
            color: #22c55e;
        }

        .macchina.IN_PRODUZIONE { border: 2px solid #16a34a; }
        .macchina.IN_SETUP { border: 2px solid #f59e0b; }
        .macchina.FERMA { border: 2px solid #dc2626; }

        .macchina.CREATO { background:#444; }

        .titolo { font-size:20px; font-weight:bold; margin-bottom:8px; }
        .sub { font-size:13px; opacity:0.9; }

        .progress { background:#222; border-radius:10px; overflow:hidden; height:12px; margin-top:8px; }
        .bar { height:100%; }

        button {
            width:100%;
            padding:10px;
            margin-top:6px;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
        }

        .start { background:#00c853; }
        .versa { background:#2196f3; }
        .chiudi { background:#c62828; }

        input {
            width:100%;
            padding:10px;
            border-radius:8px;
            border:none;
            box-sizing: border-box;
        }

        .topnav {
            position: sticky;
            top: 0;
            background: #020617;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1e293b;
        }

        .topnav a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 16px;
        }

        .topnav a:hover {
            background: #1e293b;
        }

        .backup-btn {
            width: auto !important;
            padding: 4px 8px !important;
            font-size: 12px;
            background: #0284c7;
            color: white;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .logout-btn {
            width: auto !important;
            padding: 6px 12px !important;
            background: #c62828;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="topnav">

    <div style="flex:1;">
        <button class="backup-btn" onclick="window.location.href='/backup'">💾</button>
    </div>

    <div style="flex:1; display:flex; justify-content:center; align-items:center; gap:20px; white-space:nowrap;">
        <a href="/index.html">🏭 Dashboard</a>
        <a href="/ordini.html">📋 Ordini</a>
        <a href="/sospesi.html">⏸ Sospesi</a>
        <a href="/storico.html">📊 Storico</a>
        <a href="/stats.html">📈 Statistiche</a>
    </div>

    <div style="flex:1; text-align:right;">
        <form method="post" action="/logout" style="display:inline;">
            <button class="logout-btn">
                Logout
            </button>
        </form>
    </div>

</div>

<h1>🏭 PANNELLO DI CONTROLLO</h1>
<div id="macchine"></div>

<script>

    let isEditing = false;

    /**
     * @typedef {Object} Ordine
     * @property {number} id
     * @property {number} quantita
     * @property {number} pezziProdotti
     * @property {number} tempoCicloSec
     * @property {string} stato
     */

    /**
     * @typedef {Object} Macchina
     * @property {string} macchina
     * @property {Ordine} attivo
     * @property {string} stato
     */

    function nomeMacchina(nome){
        if(nome === "T1") return "T1 STAR32";
        if(nome === "T2") return "T2 MURATEC MT12";
        if(nome === "T3") return "T3 BIGLIA 446T2Y2";
        return nome;
    }

    function formatStato(stato){
        return stato ? stato.replaceAll("_"," ") : "";
    }

    function coloreStato(stato){
        if(stato === "IN_SETUP") return "#ffeb3b";
        if(stato === "IN_PRODUZIONE") return "#00e676";
        if(stato === "FERMA") return "#ff5252";
        if(stato === "CREATO") return "#bdbdbd";
        return "white";
    }

    function tempoRestante(ordine){
        if(!ordine || !ordine.quantita || !ordine.tempoCicloSec) return "-";

        let mancanti = ordine.quantita - (ordine.pezziProdotti || 0);
        if(mancanti <= 0) return "0m";

        let secondi = mancanti * ordine.tempoCicloSec;
        let ore = Math.floor(secondi / 3600);
        let minuti = Math.floor((secondi % 3600) / 60);

        return ore > 0 ? `${ore}h ${minuti}m` : `${minuti}m`;
    }

    function carica(){
        fetch('/ordini/dashboard')
            .then(r=>r.json())
            .then(/** @param {Macchina[]} data */ (data)=>{

                const container = document.getElementById("macchine");
                container.innerHTML = "";

                data.forEach(m=>{

                    let ordine = m.attivo;
                    let html = "";

                    if(!ordine || !ordine.stato){
                        html = `
<div class="macchina FERMA">
<div class="titolo">${nomeMacchina(m.macchina)}</div>

<div class="sub">
Stato:
<span style="color:#dc2626; font-weight:bold;">
FERMA
</span>
</div>

<hr>

<div class="sub">Macchina ferma</div>

</div>
`;
                        container.insertAdjacentHTML("beforeend", html);
                        return;
                    }

                    html = `
<div class="macchina ${m.stato}">
<div class="titolo">${nomeMacchina(m.macchina)}</div>
<div class="sub">
Stato:
<span style="color:${coloreStato(ordine.stato)}; font-weight:bold;">
${formatStato(ordine.stato)}
</span>
</div>
`;

                    let perc = 0;
                    if(ordine.quantita > 0){
                        perc = Math.min(100, Math.round((ordine.pezziProdotti / ordine.quantita)*100));
                    }

                    let color = perc<30?"#ef4444":perc<70?"#f59e0b":"#16a34a";

                    html+=`
<hr>

<div class="info-ordine">

    <div><b>🏭 ${ordine.cliente || "-"}</b></div>

    <div>📄 Commessa: ${ordine.numeroCommessa || "-"}</div>

    <div>🔩 Codice: ${ordine.codiceParticolare || "-"}</div>

    <div class="produzione">
        📦 Produzione: ${ordine.pezziProdotti || 0} / ${ordine.quantita || 0}
    </div>

</div>

${ordine.barreRestanti > 0 ? `
<div style="font-size:12px; color:#93c5fd;">
    🧱 Servono ${ordine.barreRestanti} barre
</div>
` : ""}

<div class="progress">
<div class="bar" style="width:${perc}%; background:${color};"></div>
</div>

<div class="sub" style="text-align:right">
    ⚙️ ${perc}%
</div>
<div class="sub">⏱ Restano: ${tempoRestante(ordine)}</div>

<input type="number" id="pezzi-${ordine.id}"
onfocus="isEditing=true"
onblur="isEditing=false"
placeholder="pezzi">

<button class="start" onclick="start(${ordine.id})" ${ordine.stato!=="IN_SETUP"?"disabled":""}>START</button>
<button class="versa" onclick="versa(${ordine.id})" ${ordine.stato!=="IN_PRODUZIONE"?"disabled":""}>VERSA PEZZI</button>
<button class="chiudi" onclick="chiudi(${ordine.id})">CHIUDI</button>
<button onclick="sospendi(${ordine.id})">⏸ SOSPENDI</button>
`;

                    html+=`</div>`;
                    container.insertAdjacentHTML("beforeend", html);

                });

            });
    }

    function setup(id){ fetch(`/ordini/${id}/setup`,{method:'POST'}).then(carica); }
    function start(id){ fetch(`/ordini/${id}/start`,{method:'POST'}).then(carica); }

    function versa(id){
        isEditing = true;

        let input = document.getElementById("pezzi-"+id);
        let v = parseInt(input.value);

        if(!v || v<=0){
            alert("Inserisci numero valido");
            isEditing=false;
            return;
        }

        fetch(`/ordini/${id}/versa?pezzi=${v}`,{method:'POST'})
            .then(()=>{
                input.value="";
                isEditing=false;
                carica();
            });
    }

    function chiudi(id){
        if(!confirm("Chiudere ordine?")) return;
        fetch(`/ordini/${id}/chiudi`,{method:'POST'}).then(carica);
    }

    function sospendi(id){
        fetch(`/ordini/${id}/sospendi`, {method:'POST'})
            .then(()=>carica());
    }

    carica();

    setInterval(()=>{
        if(!isEditing){
            carica();
        }
    },5000);

</script>

</body>
</html>
