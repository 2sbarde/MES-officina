<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard Officina</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        .macchina {
            margin:10px;
            padding:15px;
            border-radius:10px;
        }

        .SETUP { background:orange; }
        .IN_PRODUZIONE { background:green; }
        .FERMA { background:red; }

        .nav { margin-bottom:20px; }
    </style>
</head>

<body>

<div class="nav">
    <a href="/ordini.html" style="color:white;">📋 Ordini</a> |
    <a href="/storico.html" style="color:white;">📊 Storico</a>
</div>

<h1>🏭 DASHBOARD MACCHINE</h1>

<div id="macchine"></div>

<script>

    function carica() {
        fetch('/ordini/dashboard')
            .then(r => r.json())
            .then(data => {

                document.getElementById("macchine").innerHTML = "";

                data.forEach(m => {

                    let html = `
                <div class="macchina ${m.stato}">

                    <b>Macchina: ${m.macchina}</b><br>
                    Stato: ${m.stato}<br>
                `;

                    if (m.ordine) {
                        html += `
                        Commessa: ${m.ordine.numeroCommessa}<br>
                        Codice: ${m.ordine.codiceParticolare}<br>
                        Prodotti: ${m.ordine.pezziProdotti}/${m.ordine.quantita}<br>
                    `;
                    } else {
                        html += `Nessun ordine attivo`;
                    }

                    html += `</div>`;

                    document.getElementById("macchine").innerHTML += html;
                });
            });
    }

    carica();

</script>

</body>
</html>
