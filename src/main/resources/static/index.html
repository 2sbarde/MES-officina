<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard Officina</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        .macchina {
            margin:10px;
            padding:15px;
            border-radius:10px;
        }

        .CREATO { background:#555; }
        .IN_SETUP { background:orange; }
        .IN_PRODUZIONE { background:green; }
        .FERMA { background:red; }

        button { margin:5px; padding:5px; }
        input { padding:5px; margin:5px; }

        .nav { margin-bottom:20px; }
    </style>
</head>

<body>

<div class="nav">
    <a href="/ordini.html" style="color:white;">📋 Ordini</a> |
    <a href="/storico.html" style="color:white;">📊 Storico</a>
</div>

<h1>🏭 DASHBOARD MACCHINE</h1>

<div id="macchine"></div>

<script>

    function carica() {
        fetch('/ordini/dashboard')
            .then(r => r.json())
            .then(data => {

                document.getElementById("macchine").innerHTML = "";

                data.forEach(m => {

                    let ordine = m.attivo;

                    let html = `
                <div class="macchina ${m.stato}">
                    <b>Macchina: ${m.macchina}</b><br>
                    Stato: ${m.stato}<br>
                `;

                    if (ordine) {
                        html += `
                        <br>
                        Commessa: ${ordine.numeroCommessa}<br>
                        Codice: ${ordine.codiceParticolare}<br>
                        Prodotti: ${ordine.pezziProdotti}/${ordine.quantita}<br>

                        <br>

                        <button onclick="setup(${ordine.id})">SETUP</button>
                        <button onclick="start(${ordine.id})">START</button>

                        <br>

                        <input type="number" id="pezzi-${ordine.id}" placeholder="totale pezzi">

                        <button onclick="versa(${ordine.id})">VERSA</button>
                        <button onclick="chiudi(${ordine.id})">CHIUDI</button>
                    `;
                    } else {
                        html += `<br>Nessun ordine attivo`;
                    }

                    html += `</div>`;

                    document.getElementById("macchine").innerHTML += html;
                });
            })
            .catch(err => {
                document.getElementById("macchine").innerHTML = "Errore caricamento dashboard";
                console.error(err);
            });
    }

    // AZIONI
    function setup(id) {
        fetch(`/ordini/${id}/setup`, {method:'POST'}).then(carica);
    }

    function start(id) {
        fetch(`/ordini/${id}/start`, {method:'POST'}).then(carica);
    }

    function versa(id) {
        let v = document.getElementById("pezzi-" + id).value;
        fetch(`/ordini/${id}/versa?pezzi=${v}`, {method:'POST'}).then(carica);
    }

    function chiudi(id) {
        fetch(`/ordini/${id}/chiudi`, {method:'POST'}).then(carica);
    }

    carica();

</script>

</body>
</html>
