<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pianificazione</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        .macchina {
            background:#222;
            margin:10px;
            padding:15px;
            border-radius:10px;
        }

        .ordine {
            margin-left:20px;
            color:#ccc;
        }
    </style>
</head>

<body>

<a href="/" style="color:white;">🏭 Dashboard</a>

<h1>📊 Pianificazione Produzione</h1>

<div id="piano"></div>

<script>

    function carica() {
        fetch('/ordini/pianificazione')
            .then(r=>r.json())
            .then(data=>{

                piano.innerHTML = "";

                data.forEach(m=>{

                    let html = `
            <div class="macchina">
                <h3>Macchina ${m.macchina}</h3>

                Tempo totale: ${m.tempoTotaleMin} min

                <br><br>
            `;

                    m.ordini.forEach(o=>{
                        html += `
                <div class="ordine">
                    ${o.commessa} → ${Math.round(o.tempo/60)} min
                </div>
                `;
                    });

                    html += `</div>`;

                    piano.innerHTML += html;
                });

            });
    }

    carica();

</script>

</body>
</html>
