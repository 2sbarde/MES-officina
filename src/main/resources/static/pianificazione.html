<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pianificazione</title>

    <style>
        body { background:#111; color:white; font-family:Arial; }

        .macchina {
            margin:20px;
            padding:10px;
            background:#222;
            border-radius:10px;
        }

        .timeline {
            display:flex;
            align-items:center;
            margin-top:10px;
        }

        .blocco {
            height:40px;
            margin-right:5px;
            border-radius:5px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:12px;
            color:black;
            overflow:hidden;
        }
    </style>
</head>

<body>

<a href="/" style="color:white;">🏭 Dashboard</a>

<h1>🗓 Pianificazione Reale</h1>

<div id="piano"></div>

<script>

    function carica() {

        fetch('/ordini/pianificazione')
            .then(r=>r.json())
            .then(data=>{

                piano.innerHTML="";

                data.forEach(m=>{

                    let html = `
<div class="macchina">
<b>Macchina ${m.macchina}</b>

<div class="timeline">
`;

                    m.ordini.forEach(o=>{

// 🔥 SCALA REALE (puoi regolare questo)
                        let scala = 0.05;

// larghezza proporzionale al tempo
                        let width = o.durata * scala;

                        if(width < 50) width = 50; // minimo visibile

                        html += `
<div class="blocco" style="width:${width}px; background:lime;">
${o.commessa}
</div>
`;

                    });

                    html += `
</div>
</div>
`;

                    piano.innerHTML += html;

                });

            });
    }

    carica();

</script>

</body>
</html>
